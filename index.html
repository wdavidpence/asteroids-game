<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Asteroids</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02040c;color:white;font-family:system-ui,Segoe UI,Arial,sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100vw;height:100vh;background:radial-gradient(circle at 50% 45%,#101733 0,#050816 42%,#01030a 100%)}.hint{position:fixed;left:12px;bottom:10px;color:#9fb3ff;font-size:12px;opacity:.8;pointer-events:none}.btn{position:fixed;bottom:22px;width:76px;height:76px;border:1px solid #5af;border-radius:50%;background:#1133aa44;color:white;font-weight:800;font-size:22px;display:none;align-items:center;justify-content:center}.left{left:18px}.right{left:108px}.thrust{right:108px}.fire{right:18px}@media(pointer:coarse){.btn{display:flex}.hint{display:none}}</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hint">←/→ rotate • ↑/W thrust • Space shoot • P pause • Enter restart</div>
<div class="btn left" data-key="left">⟲</div><div class="btn right" data-key="right">⟳</div><div class="btn thrust" data-key="thrust">▲</div><div class="btn fire" data-key="fire">●</div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const TAU=Math.PI*2,RAND=Math.random;
const CFG={rot:4.4,thrust:360,friction:.992,bulletSpeed:650,bulletLife:1.15,bulletCd:.16,shipR:16,invuln:1.8,maxBullets:8};
let W=0,H=0,DPR=1,last=0,paused=false,gameOver=false,level=1,score=0,high=+localStorage.asteroidsHighScore||0;
let keys={left:false,right:false,thrust:false,fire:false},stars=[],ship,bullets=[],asteroids=[],particles=[],saucers=[],lastShot=0,message='';
let audio;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);stars=Array.from({length:140},()=>({x:RAND()*W,y:RAND()*H,z:.25+RAND()*1.2,r:RAND()*1.7}));}
addEventListener('resize',resize,{passive:true});resize();
function initAudio(){try{let AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;audio=audio||new AC();if(audio.state==='suspended')audio.resume();}catch(e){}}
function beep(type){try{initAudio();if(!audio)return;let t=audio.currentTime,o=audio.createOscillator(),g=audio.createGain();o.connect(g);g.connect(audio.destination);g.gain.value=.0001;if(type==='shoot'){o.type='square';o.frequency.setValueAtTime(1050,t);o.frequency.exponentialRampToValueAtTime(220,t+.08);g.gain.exponentialRampToValueAtTime(.18,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+.09);o.start(t);o.stop(t+.1);}else if(type==='boom'){o.type='sawtooth';o.frequency.setValueAtTime(95,t);o.frequency.exponentialRampToValueAtTime(35,t+.28);g.gain.exponentialRampToValueAtTime(.28,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.32);o.start(t);o.stop(t+.35);}else if(type==='hit'){o.type='triangle';o.frequency.setValueAtTime(420,t);o.frequency.exponentialRampToValueAtTime(90,t+.18);g.gain.exponentialRampToValueAtTime(.23,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.22);}else if(type==='level'){[392,523,659,784].forEach((f,i)=>{let oo=audio.createOscillator(),gg=audio.createGain(),tt=t+i*.09;oo.type='sine';oo.frequency.value=f;oo.connect(gg);gg.connect(audio.destination);gg.gain.setValueAtTime(.001,tt);gg.gain.exponentialRampToValueAtTime(.18,tt+.02);gg.gain.exponentialRampToValueAtTime(.001,tt+.25);oo.start(tt);oo.stop(tt+.28);});}}catch(e){}}
function wrap(o,r=0){if(o.x<-r)o.x=W+r;if(o.x>W+r)o.x=-r;if(o.y<-r)o.y=H+r;if(o.y>H+r)o.y=-r;}
function dist2(a,b){let x=a.x-b.x,y=a.y-b.y;return x*x+y*y;}
function reset(){gameOver=false;paused=false;level=1;score=0;message='';ship={x:W/2,y:H/2,vx:0,vy:0,a:-Math.PI/2,shields:8,inv:CFG.invuln,dead:false};bullets=[];particles=[];saucers=[];spawnLevel();}
function spawnLevel(){asteroids=[];let n=4+level;for(let i=0;i<n;i++){let edge=Math.floor(RAND()*4),x=edge===0?0:edge===1?W:RAND()*W,y=edge===2?0:edge===3?H:RAND()*H;if(Math.hypot(x-W/2,y-H/2)<170){x=(x+260)%W;y=(y+190)%H;}addAsteroid(x,y,46,35+level*7);}if(level%2===0)spawnSaucer();message='LEVEL '+level;setTimeout(()=>{if(!gameOver)message='';},1200);beep('level');}
function addAsteroid(x,y,r,speed){let a=RAND()*TAU,verts=Array.from({length:10+Math.floor(RAND()*4)},(_,i)=>({ang:i*TAU/(10+Math.floor(RAND()*4)),rad:r*(.72+RAND()*.42)}));asteroids.push({x,y,r,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,spin:(RAND()-.5)*1.6,a:RAND()*TAU,verts});}
function spawnSaucer(){let side=RAND()<.5?-30:W+30;saucers.push({x:side,y:80+RAND()*(H-160),vx:side<0?90:-90,vy:(RAND()-.5)*80,r:18,shoot:1.5,hp:2});}
function shoot(){if(gameOver){reset();return;}let now=performance.now()/1000;if(now-lastShot<CFG.bulletCd||bullets.length>=CFG.maxBullets)return;lastShot=now;let nose={x:ship.x+Math.cos(ship.a)*CFG.shipR,y:ship.y+Math.sin(ship.a)*CFG.shipR};bullets.push({x:nose.x,y:nose.y,vx:ship.vx+Math.cos(ship.a)*CFG.bulletSpeed,vy:ship.vy+Math.sin(ship.a)*CFG.bulletSpeed,life:CFG.bulletLife,owner:'ship'});spark(nose.x,nose.y,5,'#6ff',110);beep('shoot');}
function saucerShoot(s){let a=Math.atan2(ship.y-s.y,ship.x-s.x)+(RAND()-.5)*.35;bullets.push({x:s.x,y:s.y,vx:Math.cos(a)*360,vy:Math.sin(a)*360,life:1.8,owner:'saucer'});beep('shoot');}
function spark(x,y,n,c='#fa5',pow=160){for(let i=0;i<n;i++){let a=RAND()*TAU,sp=RAND()*pow;particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.35+RAND()*.55,max:.9,c,r:1+RAND()*3});}}
function damage(){if(ship.inv>0||gameOver)return;ship.shields--;ship.inv=CFG.invuln;spark(ship.x,ship.y,28,'#7df',260);beep('hit');if(ship.shields<=0){gameOver=true;message='GAME OVER';spark(ship.x,ship.y,90,'#f64',430);beep('boom');if(score>high){high=score;localStorage.asteroidsHighScore=high;}}}
function split(a){score+=a.r>32?30:a.r>20?50:100;spark(a.x,a.y,24,'#fa5',240);beep('boom');if(a.r>22){for(let i=0;i<2;i++)addAsteroid(a.x+(RAND()-.5)*12,a.y+(RAND()-.5)*12,a.r*.56,70+level*10+RAND()*35);} }
function update(dt){if(paused||gameOver)return;if(keys.left)ship.a-=CFG.rot*dt;if(keys.right)ship.a+=CFG.rot*dt;if(keys.thrust){ship.vx+=Math.cos(ship.a)*CFG.thrust*dt;ship.vy+=Math.sin(ship.a)*CFG.thrust*dt;if(RAND()<.75)spark(ship.x-Math.cos(ship.a)*16,ship.y-Math.sin(ship.a)*16,1,'#f90',80);}if(keys.fire)shoot();ship.x+=ship.vx*dt;ship.y+=ship.vy*dt;ship.vx*=Math.pow(CFG.friction,dt*60);ship.vy*=Math.pow(CFG.friction,dt*60);wrap(ship,22);ship.inv=Math.max(0,ship.inv-dt);
for(let i=bullets.length-1;i>=0;i--){let b=bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;wrap(b,4);if(b.life<=0)bullets.splice(i,1);}
for(const a of asteroids){a.x+=a.vx*dt;a.y+=a.vy*dt;a.a+=a.spin*dt;wrap(a,a.r);}for(let i=saucers.length-1;i>=0;i--){let s=saucers[i];s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=Math.sin(performance.now()/500+i)*20*dt;if(s.y<40||s.y>H-40)s.vy*=-1;if(s.x<-60||s.x>W+60){saucers.splice(i,1);continue;}s.shoot-=dt;if(s.shoot<=0){s.shoot=1.2+RAND()*1.4;saucerShoot(s);}}
for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.985;p.vy*=.985;p.life-=dt;if(p.life<=0)particles.splice(i,1);}collide();if(asteroids.length===0){level++;spawnLevel();}if(level%2===0&&saucers.length===0&&RAND()<dt*.05)spawnSaucer();}
function collide(){for(let bi=bullets.length-1;bi>=0;bi--){let b=bullets[bi];if(b.owner==='ship'){let hit=false;for(let ai=asteroids.length-1;ai>=0;ai--){let a=asteroids[ai];if(dist2(b,a)<(a.r+4)*(a.r+4)){asteroids.splice(ai,1);bullets.splice(bi,1);split(a);hit=true;break;}}if(hit)continue;for(let si=saucers.length-1;si>=0;si--){let s=saucers[si];if(dist2(b,s)<(s.r+5)*(s.r+5)){bullets.splice(bi,1);s.hp--;spark(s.x,s.y,12,'#f44',170);score+=75;if(s.hp<=0){score+=250;saucers.splice(si,1);beep('boom');}break;}}}else if(dist2(b,ship)<(CFG.shipR+3)*(CFG.shipR+3)){bullets.splice(bi,1);damage();}}
for(let ai=asteroids.length-1;ai>=0;ai--){let a=asteroids[ai];if(dist2(ship,a)<(a.r+CFG.shipR*.72)*(a.r+CFG.shipR*.72)){asteroids.splice(ai,1);split(a);damage();}}
for(let si=saucers.length-1;si>=0;si--){let s=saucers[si];if(dist2(ship,s)<(s.r+CFG.shipR)*(s.r+CFG.shipR)){saucers.splice(si,1);score+=200;spark(s.x,s.y,28,'#f44',260);damage();}}}
function draw(){ctx.clearRect(0,0,W,H);for(const s of stars){s.x-=ship.vx*.006*s.z;s.y-=ship.vy*.006*s.z;wrap(s,2);ctx.globalAlpha=.35+.45*s.z;ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.r,s.r);}ctx.globalAlpha=1;for(const a of asteroids)drawAst(a);for(const s of saucers)drawSaucer(s);for(const b of bullets){ctx.fillStyle=b.owner==='ship'?'#86ffff':'#ff6666';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(b.x,b.y,3,0,TAU);ctx.fill();ctx.shadowBlur=0;}for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();}ctx.globalAlpha=1;if(!gameOver)drawShip();drawHUD();}
function drawAst(a){ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.a);ctx.strokeStyle='#9aa3c7';ctx.fillStyle='#34384f';ctx.lineWidth=2;ctx.beginPath();a.verts.forEach((p,i)=>{let x=Math.cos(p.ang)*p.rad,y=Math.sin(p.ang)*p.rad;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.closePath();ctx.fill();ctx.stroke();ctx.restore();}
function drawSaucer(s){ctx.save();ctx.translate(s.x,s.y);ctx.shadowColor='#f93';ctx.shadowBlur=14;ctx.fillStyle='#9b6d25';ctx.strokeStyle='#ffd18a';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,0,24,10,0,0,TAU);ctx.fill();ctx.stroke();ctx.fillStyle='#58d6ff';ctx.beginPath();ctx.ellipse(0,-6,11,7,0,Math.PI,TAU);ctx.fill();ctx.restore();ctx.shadowBlur=0;}
function drawShip(){ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.a);if(ship.inv>0&&Math.floor(ship.inv*12)%2===0){ctx.globalAlpha=.42;}ctx.strokeStyle='#7ff';ctx.fillStyle='#f8ffff';ctx.lineWidth=2;ctx.shadowColor='#6ff';ctx.shadowBlur=12;ctx.beginPath();ctx.moveTo(19,0);ctx.lineTo(-14,-11);ctx.lineTo(-8,0);ctx.lineTo(-14,11);ctx.closePath();ctx.fill();ctx.stroke();if(keys.thrust){ctx.fillStyle='#ff9a2f';ctx.beginPath();ctx.moveTo(-13,-7);ctx.lineTo(-28,0);ctx.lineTo(-13,7);ctx.fill();}ctx.restore();if(ship.inv>0||ship.shields>0){ctx.strokeStyle='rgba(90,190,255,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ship.x,ship.y,25,0,TAU);ctx.stroke();}}
function drawHUD(){ctx.shadowBlur=0;ctx.fillStyle='#dce8ff';ctx.font='700 18px system-ui';ctx.textAlign='left';ctx.fillText('SCORE '+score,18,30);ctx.fillText('HIGH '+high,18,54);ctx.textAlign='right';ctx.fillText('LEVEL '+level,W-18,30);ctx.fillText('SHIELDS '+Math.max(0,ship.shields),W-18,54);if(paused||message||gameOver){ctx.textAlign='center';ctx.fillStyle=gameOver?'#ff6262':'#ffd36a';ctx.font='800 42px system-ui';ctx.fillText(paused?'PAUSED':message,W/2,H/2-20);ctx.font='18px system-ui';ctx.fillStyle='#dce8ff';ctx.fillText(gameOver?'Press Enter / tap fire to restart':'',W/2,H/2+22);}}
function loop(t){let dt=Math.min(.033,(t-last)/1000||.016);last=t;update(dt);draw();requestAnimationFrame(loop);}requestAnimationFrame(loop);
function setKey(k,v){if(k==='ArrowLeft'||k==='a')keys.left=v;if(k==='ArrowRight'||k==='d')keys.right=v;if(k==='ArrowUp'||k==='w')keys.thrust=v;if(k===' ')keys.fire=v;}
addEventListener('keydown',e=>{initAudio();if(e.key==='p'||e.key==='P'){paused=!paused;return;}if(e.key==='Enter'&&gameOver){reset();return;}setKey(e.key,true);if(e.key===' ')e.preventDefault();});addEventListener('keyup',e=>setKey(e.key,false));
document.querySelectorAll('.btn').forEach(el=>{let k=el.dataset.key;let on=e=>{e.preventDefault();initAudio();if(k==='fire'){keys.fire=true;shoot();}else keys[k]=true;};let off=e=>{e.preventDefault();keys[k]=false;};el.addEventListener('pointerdown',on);el.addEventListener('pointerup',off);el.addEventListener('pointercancel',off);el.addEventListener('pointerleave',off);});
canvas.addEventListener('pointerdown',e=>{initAudio();if(gameOver){reset();return;}if(e.pointerType==='mouse')return;let x=e.clientX;if(x<W*.33)keys.left=true;else if(x>W*.66)keys.right=true;else{keys.thrust=true;shoot();}});canvas.addEventListener('pointerup',()=>{keys.left=keys.right=keys.thrust=false;});
reset();
})();
</script>
</body>
</html>
