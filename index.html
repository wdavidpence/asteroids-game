<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Asteroids</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:"Courier New",Courier,monospace;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100vw;height:100vh;background:#000}
.hint{position:fixed;left:12px;bottom:10px;color:#9aa;font-size:12px;opacity:.75;pointer-events:none}
.btn{position:fixed;bottom:22px;width:76px;height:76px;border:1px solid #8af;border-radius:50%;background:#0a1a3a55;color:#cfe;font-weight:700;font-size:22px;display:none;align-items:center;justify-content:center;touch-action:none}
.left{left:18px}.right{left:108px}.thrust{right:108px}.fire{right:18px}
.hyper{right:18px;bottom:112px;width:64px;height:64px;font-size:14px;letter-spacing:1px}
@media(pointer:coarse){.btn{display:flex}.hint{display:none}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hint">←/→ rotate · ↑/W thrust · Space fire · H/Shift hyperspace · M mute · P pause · Enter restart · ?debug=1</div>
<div class="btn left" data-key="left">⟲</div>
<div class="btn right" data-key="right">⟳</div>
<div class="btn thrust" data-key="thrust">▲</div>
<div class="btn fire" data-key="fire">●</div>
<div class="btn hyper" data-key="hyper">HS</div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const TAU=Math.PI*2,RAND=Math.random;
// Pass 2 physics (near-frictionless) + Pass 3 lives model
const CFG={
  rot:4.2,
  thrust:280,
  friction:1.0,          // classic: no drag (Pass 2)
  maxSpeed:520,          // soft cap so phone runs stay controllable
  bulletSpeed:520,
  bulletLife:1.05,
  bulletCd:0.18,
  maxBullets:4,          // original-ish simultaneous shots
  shipR:14,
  invuln:2.2,
  startLives:3,
  extraLifeEvery:10000,
  respawnDelay:2.0,
  // Pass 4 — classic rock economy
  rockR:{L:42,M:22,S:11},
  rockScore:{L:20,M:50,S:100},
  rockSpeed:{L:45,M:85,S:130},
  rockChildJitter:0.55,
  // Pass 5 — hyperspace
  hyperFailChance:1/6,
  hyperDelay:0.35,
  hyperCooldown:0.85,
  // Pass 6 — dual saucers
  saucerScore:{L:200,S:1000},
  saucerOnlySmallAt:40000,
  saucerSpawnMin:8,
  saucerSpawnMax:16,
  // Pass 7 — audio pacing
  beatMinInterval:0.85,
  beatMaxInterval:0.28,
  fxStars:false,
  vectorGlow:2
};
const DEBUG=new URLSearchParams(location.search).get('debug')==='1';
let W=0,H=0,DPR=1,last=0,paused=false,gameOver=false,level=1,score=0,high=+localStorage.asteroidsHighScore||0;
let lives=CFG.startLives,nextExtraAt=CFG.extraLifeEvery,respawnT=0;
let keys={left:false,right:false,thrust:false,fire:false},stars=[],ship,bullets=[],asteroids=[],particles=[],saucers=[],debris=[],lastShot=0,message='';
let lastHyper=0,saucerTimer=12;
let audio,thrustNodes=null,saucerNodes=null,beatT=0,beatHi=false,muted=false;
let fps=0,fpsFrames=0,fpsLast=performance.now();

function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  canvas.width=W*DPR;canvas.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(CFG.fxStars){
    stars=Array.from({length:140},()=>({x:RAND()*W,y:RAND()*H,z:.25+RAND()*1.2,r:RAND()*1.7}));
  }else stars=[];
}
addEventListener('resize',resize,{passive:true});resize();

function initAudio(){try{const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;audio=audio||new AC();if(audio.state==='suspended')audio.resume();}catch(e){}}

// Pass 7: one-shot SFX + size bangs + loops (thrust/saucer/beat)
function beep(type,size){
  if(muted)return;
  try{
    initAudio();if(!audio)return;
    const t=audio.currentTime;
    const blip=(freq0,freq1,dur,wave,gainPeak)=>{
      const o=audio.createOscillator(),g=audio.createGain();
      o.type=wave||'square';o.connect(g);g.connect(audio.destination);
      o.frequency.setValueAtTime(freq0,t);
      if(freq1)o.frequency.exponentialRampToValueAtTime(Math.max(1,freq1),t+dur);
      g.gain.setValueAtTime(.0001,t);
      g.gain.exponentialRampToValueAtTime(gainPeak||.18,t+.01);
      g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      o.start(t);o.stop(t+dur+.02);
    };
    if(type==='shoot')blip(1100,180,.09,'square',.16);
    else if(type==='boom'){
      // size-based bangs: L longer/lower, S short/higher
      const s=size||'M';
      if(s==='L')blip(90,28,.42,'sawtooth',.32);
      else if(s==='S')blip(180,50,.16,'sawtooth',.2);
      else if(s==='ship')blip(70,22,.55,'sawtooth',.35);
      else blip(120,35,.28,'sawtooth',.26);
    }
    else if(type==='hit')blip(420,90,.18,'triangle',.2);
    else if(type==='hyper')blip(200,900,.25,'sine',.14);
    else if(type==='extra'){
      [523,659,784,1046].forEach((f,i)=>{
        const oo=audio.createOscillator(),gg=audio.createGain(),tt=t+i*.07;
        oo.type='sine';oo.frequency.value=f;oo.connect(gg);gg.connect(audio.destination);
        gg.gain.setValueAtTime(.001,tt);gg.gain.exponentialRampToValueAtTime(.16,tt+.02);gg.gain.exponentialRampToValueAtTime(.001,tt+.2);
        oo.start(tt);oo.stop(tt+.22);
      });
    }else if(type==='level'){
      [392,523,659,784].forEach((f,i)=>{
        const oo=audio.createOscillator(),gg=audio.createGain(),tt=t+i*.09;
        oo.type='sine';oo.frequency.value=f;oo.connect(gg);gg.connect(audio.destination);
        gg.gain.setValueAtTime(.001,tt);gg.gain.exponentialRampToValueAtTime(.18,tt+.02);gg.gain.exponentialRampToValueAtTime(.001,tt+.25);
        oo.start(tt);oo.stop(tt+.28);
      });
    }else if(type==='beat'){
      blip(beatHi?90:55,beatHi?70:40,.08,'triangle',.12);
    }
  }catch(e){}
}

function setThrustSound(on){
  if(muted){stopThrustSound();return;}
  try{
    initAudio();if(!audio)return;
    if(on){
      if(thrustNodes)return;
      const o=audio.createOscillator(),g=audio.createGain(),f=audio.createBiquadFilter();
      o.type='sawtooth';o.frequency.value=55;
      f.type='lowpass';f.frequency.value=420;
      o.connect(f);f.connect(g);g.connect(audio.destination);
      g.gain.value=.0001;g.gain.exponentialRampToValueAtTime(.05,audio.currentTime+.05);
      o.start();
      thrustNodes={o,g};
    }else stopThrustSound();
  }catch(e){}
}
function stopThrustSound(){
  if(!thrustNodes||!audio)return;
  try{
    const t=audio.currentTime;
    thrustNodes.g.gain.cancelScheduledValues(t);
    thrustNodes.g.gain.setValueAtTime(Math.max(.0001,thrustNodes.g.gain.value),t);
    thrustNodes.g.gain.exponentialRampToValueAtTime(.0001,t+.05);
    thrustNodes.o.stop(t+.08);
  }catch(e){}
  thrustNodes=null;
}

function setSaucerSound(kind){
  // kind: null | 'L' | 'S'
  stopSaucerSound();
  if(!kind||muted)return;
  try{
    initAudio();if(!audio)return;
    const o1=audio.createOscillator(),o2=audio.createOscillator(),g=audio.createGain();
    o1.type='square';o2.type='square';
    // large = slower warble lower; small = faster higher
    if(kind==='L'){o1.frequency.value=180;o2.frequency.value=210;}
    else{o1.frequency.value=260;o2.frequency.value=320;}
    o1.connect(g);o2.connect(g);g.connect(audio.destination);
    g.gain.value=.0001;g.gain.exponentialRampToValueAtTime(.04,audio.currentTime+.08);
    // LFO-ish via periodic frequency wobble using oscillator detune automation loop
    const wob=()=>{
      if(!saucerNodes)return;
      const t=audio.currentTime;
      const a=kind==='L'?12:22,rate=kind==='L'?3:6;
      o1.frequency.setValueAtTime(o1.frequency.value,t);
      o1.frequency.linearRampToValueAtTime(o1.frequency.value+(RAND()-.5)*a*2,t+1/rate);
      setTimeout(wob,1000/rate);
    };
    o1.start();o2.start();saucerNodes={o1,o2,g,kind};wob();
  }catch(e){}
}
function stopSaucerSound(){
  if(!saucerNodes||!audio){saucerNodes=null;return;}
  try{
    const t=audio.currentTime;
    saucerNodes.g.gain.cancelScheduledValues(t);
    saucerNodes.g.gain.setValueAtTime(Math.max(.0001,saucerNodes.g.gain.value),t);
    saucerNodes.g.gain.exponentialRampToValueAtTime(.0001,t+.08);
    saucerNodes.o1.stop(t+.1);saucerNodes.o2.stop(t+.1);
  }catch(e){}
  saucerNodes=null;
}

function updateBeat(dt){
  if(muted||paused||gameOver)return;
  // faster beat as fewer rocks remain / higher level
  const danger=Math.min(1,level/10+(asteroids.length? (1/(1+asteroids.length))*0.7:0.9));
  const interval=CFG.beatMinInterval-(CFG.beatMinInterval-CFG.beatMaxInterval)*danger;
  beatT-=dt;
  if(beatT<=0){
    beatT=interval;
    beatHi=!beatHi;
    beep('beat');
  }
}

function wrap(o,r=0){if(o.x<-r)o.x=W+r;if(o.x>W+r)o.x=-r;if(o.y<-r)o.y=H+r;if(o.y>H+r)o.y=-r;}
function dist2(a,b){const x=a.x-b.x,y=a.y-b.y;return x*x+y*y;}

function addScore(n){
  const prev=score;
  score+=n;
  while(score>=nextExtraAt){
    lives++;
    nextExtraAt+=CFG.extraLifeEvery;
    message='EXTRA LIFE';
    setTimeout(()=>{if(message==='EXTRA LIFE')message='';},900);
    beep('extra');
  }
  return score-prev;
}

function makeShip(x,y,inv){
  return {x,y,vx:0,vy:0,a:-Math.PI/2,inv:inv||0,dead:false,hyper:0};
}

function reset(){
  gameOver=false;paused=false;level=1;score=0;message='';
  lives=CFG.startLives;nextExtraAt=CFG.extraLifeEvery;respawnT=0;debris=[];
  saucerTimer=CFG.saucerSpawnMin+RAND()*(CFG.saucerSpawnMax-CFG.saucerSpawnMin);
  ship=makeShip(W/2,H/2,CFG.invuln);
  bullets=[];particles=[];saucers=[];
  stopSaucerSound();stopThrustSound();beatT=0.5;beatHi=false;
  spawnLevel();
}

function spawnLevel(){
  asteroids=[];
  // Pass 4: only LARGE rocks; count scales then soft-caps
  const n=Math.min(4+level,11);
  for(let i=0;i<n;i++){
    const edge=Math.floor(RAND()*4);
    let x=edge===0?0:edge===1?W:RAND()*W,y=edge===2?0:edge===3?H:RAND()*H;
    if(Math.hypot(x-W/2,y-H/2)<170){x=(x+260)%W;y=(y+190)%H;}
    addAsteroid(x,y,'L');
  }
  // don't auto-spawn saucer on every even level — Pass 6 uses timer
  saucerTimer=Math.min(saucerTimer,4+RAND()*4);
  message='LEVEL '+level;setTimeout(()=>{if(!gameOver&&message==='LEVEL '+level)message='';},1200);beep('level');
}
function addAsteroid(x,y,size,vx,vy){
  const r=CFG.rockR[size],base=CFG.rockSpeed[size]*(0.85+RAND()*0.35);
  const a=RAND()*TAU,n=9+Math.floor(RAND()*5);
  const verts=Array.from({length:n},(_,i)=>({ang:i*TAU/n+(RAND()-.5)*0.12,rad:r*(.72+RAND()*.42)}));
  const spd=base+(size==='L'?level*2:size==='M'?level*3:level*4);
  asteroids.push({
    x,y,r,size,
    vx:vx!=null?vx:Math.cos(a)*spd,
    vy:vy!=null?vy:Math.sin(a)*spd,
    spin:(RAND()-.5)*1.8,a:RAND()*TAU,verts
  });
}

// Pass 6: large (dumb/200) vs small (aims/1000); only small after 40k
function pickSaucerKind(){
  if(score>=CFG.saucerOnlySmallAt)return 'S';
  // early: mostly large; late/high score: more small
  const pSmall=Math.min(0.75,0.15+score/80000+level*0.03);
  return RAND()<pSmall?'S':'L';
}
function spawnSaucer(forceKind){
  if(saucers.length)return;
  const kind=forceKind||pickSaucerKind();
  const side=RAND()<.5?-40:W+40;
  const speed=kind==='L'?70:120;
  saucers.push({
    kind,x:side,y:60+RAND()*(H-120),
    vx:side<0?speed:-speed,
    vy:(RAND()-.5)*(kind==='L'?40:70),
    r:kind==='L'?20:12,
    shoot:kind==='L'?1.6:0.9
  });
  setSaucerSound(kind);
}
function saucerShoot(s){
  if(!ship||ship.dead||ship.hyper>0)return;
  let a;
  if(s.kind==='L'){
    // large: mostly random / poor aim
    a=RAND()*TAU;
  }else{
    // small: aims at ship; accuracy tightens with score
    const toShip=Math.atan2(ship.y-s.y,ship.x-s.x);
    // error range shrinks from ~±0.9 rad down toward ~±0.05
    const errMax=Math.max(0.05,0.9-score/50000);
    a=toShip+(RAND()-.5)*2*errMax;
  }
  const spd=s.kind==='L'?280:380;
  bullets.push({x:s.x,y:s.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:2.0,owner:'saucer'});
  beep('shoot');
}

function shoot(){
  if(gameOver){reset();return;}
  if(!ship||ship.dead||ship.hyper>0)return;
  const now=performance.now()/1000;
  if(now-lastShot<CFG.bulletCd||bullets.length>=CFG.maxBullets)return;
  lastShot=now;
  const nose={x:ship.x+Math.cos(ship.a)*CFG.shipR,y:ship.y+Math.sin(ship.a)*CFG.shipR};
  // Pass 2: fixed muzzle velocity (minimal ship-velocity inherit) for classic shot feel
  bullets.push({
    x:nose.x,y:nose.y,
    vx:Math.cos(ship.a)*CFG.bulletSpeed,
    vy:Math.sin(ship.a)*CFG.bulletSpeed,
    life:CFG.bulletLife,owner:'ship'
  });
  spark(nose.x,nose.y,3,'#fff',70);beep('shoot');
}
function spark(x,y,n,c='#fff',pow=160){
  for(let i=0;i<n;i++){
    const a=RAND()*TAU,sp=RAND()*pow;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.35+RAND()*.55,max:.9,c,r:1+RAND()*2.2});
  }
}
function spawnDebris(x,y,a){
  // vector ship-break lines
  for(let i=0;i<6;i++){
    const ang=a+(i/6)*TAU+(RAND()-.5)*.4,len=6+RAND()*10,sp=40+RAND()*90;
    debris.push({
      x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
      a:RAND()*TAU,spin:(RAND()-.5)*6,life:.9+RAND()*.7,
      x1:-len*.5,y1:0,x2:len*.5,y2:0
    });
  }
  spark(x,y,40,'#fff',300);
}

// Pass 3: lethal hit → explode → lose life → respawn or game over
function damage(force){
  if(!ship||ship.dead||gameOver)return;
  if(!force&&(ship.inv>0||ship.hyper>0))return;
  ship.dead=true;ship.hyper=0;
  ship.vx=0;ship.vy=0;
  spawnDebris(ship.x,ship.y,ship.a);
  beep('boom','ship');
  stopThrustSound();
  lives--;
  if(lives<=0){
    gameOver=true;message='GAME OVER';respawnT=0;
    if(score>high){high=score;localStorage.asteroidsHighScore=high;}
  }else{
    respawnT=CFG.respawnDelay;
    message='';
  }
}

// Pass 5: hyperspace vanish → random reentry (1/6 self-destruct)
function hyperspace(){
  if(gameOver||paused||!ship||ship.dead||ship.hyper>0)return;
  const now=performance.now()/1000;
  if(now-lastHyper<CFG.hyperCooldown)return;
  lastHyper=now;
  ship.hyper=CFG.hyperDelay;
  ship.vx=0;ship.vy=0;
  stopThrustSound();
  beep('hyper');
}

function respawnShip(){
  ship=makeShip(W/2,H/2,CFG.invuln);
  respawnT=0;
  // clear enemy bullets near center so instant death on spawn is rarer
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(b.owner==='saucer'&&dist2(b,ship)<120*120)bullets.splice(i,1);
  }
}

function split(a){
  const size=a.size||(a.r>30?'L':a.r>16?'M':'S');
  addScore(CFG.rockScore[size]||100);
  spark(a.x,a.y,size==='L'?28:size==='M'?18:12,'#fff',size==='L'?260:180);beep('boom',size);
  const child=size==='L'?'M':size==='M'?'S':null;
  if(!child)return;
  for(let i=0;i<2;i++){
    const ang=RAND()*TAU,sp=CFG.rockSpeed[child]*(0.9+RAND()*0.4)+(level*2);
    const j=CFG.rockChildJitter*a.r;
    addAsteroid(
      a.x+(RAND()-.5)*j*2,
      a.y+(RAND()-.5)*j*2,
      child,
      Math.cos(ang)*sp,
      Math.sin(ang)*sp
    );
  }
}

function clampShipSpeed(){
  const sp=Math.hypot(ship.vx,ship.vy);
  if(sp>CFG.maxSpeed){
    const k=CFG.maxSpeed/sp;
    ship.vx*=k;ship.vy*=k;
  }
}

function update(dt){
  if(paused||gameOver){
    stopThrustSound();
    if(gameOver)stopSaucerSound();
    updateFX(dt);
    return;
  }

  updateBeat(dt);

  // respawn timer while dead
  if(ship.dead){
    stopThrustSound();
    respawnT-=dt;
    if(respawnT<=0&&lives>0)respawnShip();
  }else if(ship.hyper>0){
    // Pass 5: in hyperspace — invisible, no control/collision
    stopThrustSound();
    ship.hyper-=dt;
    if(ship.hyper<=0){
      ship.hyper=0;
      if(RAND()<CFG.hyperFailChance){
        // re-entry fail ≈ original 1/6
        ship.x=40+RAND()*(W-80);ship.y=40+RAND()*(H-80);
        damage(true);
      }else{
        ship.x=40+RAND()*(W-80);ship.y=40+RAND()*(H-80);
        ship.vx=0;ship.vy=0;
        ship.inv=Math.max(ship.inv,0.6);
      }
    }
  }else{
    if(keys.left)ship.a-=CFG.rot*dt;
    if(keys.right)ship.a+=CFG.rot*dt;
    if(keys.thrust){
      ship.vx+=Math.cos(ship.a)*CFG.thrust*dt;
      ship.vy+=Math.sin(ship.a)*CFG.thrust*dt;
      clampShipSpeed();
      setThrustSound(true);
      if(RAND()<.7)spark(ship.x-Math.cos(ship.a)*14,ship.y-Math.sin(ship.a)*14,1,'#fc6',60);
    }else setThrustSound(false);
    if(keys.fire)shoot();
    ship.x+=ship.vx*dt;ship.y+=ship.vy*dt;
    // friction 1.0 → no decay; keep pow for future tuning
    if(CFG.friction!==1){
      ship.vx*=Math.pow(CFG.friction,dt*60);
      ship.vy*=Math.pow(CFG.friction,dt*60);
    }
    wrap(ship,22);
    ship.inv=Math.max(0,ship.inv-dt);
  }

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;wrap(b,4);
    if(b.life<=0)bullets.splice(i,1);
  }
  for(const a of asteroids){a.x+=a.vx*dt;a.y+=a.vy*dt;a.a+=a.spin*dt;wrap(a,a.r);}
  for(let i=saucers.length-1;i>=0;i--){
    const s=saucers[i];
    s.x+=s.vx*dt;s.y+=s.vy*dt;
    // gentle vertical weave; small more twitchy
    s.vy+=Math.sin(performance.now()/(s.kind==='S'?280:500)+i)*(s.kind==='S'?35:18)*dt;
    if(s.y<30||s.y>H-30)s.vy*=-1;
    if(s.x<-80||s.x>W+80){saucers.splice(i,1);if(!saucers.length)stopSaucerSound();continue;}
    s.shoot-=dt;
    if(s.shoot<=0&&!ship.dead&&ship.hyper<=0){
      s.shoot=(s.kind==='L'?1.4+RAND()*1.2:0.55+RAND()*0.55);
      saucerShoot(s);
    }
  }
  // keep saucer tone in sync with alive saucer kind
  if(saucers.length&&(!saucerNodes||saucerNodes.kind!==saucers[0].kind))setSaucerSound(saucers[0].kind);
  if(!saucers.length&&saucerNodes)stopSaucerSound();

  updateFX(dt);
  if(!ship.dead&&ship.hyper<=0)collide();
  if(asteroids.length===0&&!saucers.length){level++;spawnLevel();}
  // Pass 6 spawn timer (allows lurking meta if one rock left)
  saucerTimer-=dt;
  if(saucerTimer<=0&&!saucers.length&&asteroids.length>0){
    spawnSaucer();
    saucerTimer=CFG.saucerSpawnMin+RAND()*(CFG.saucerSpawnMax-CFG.saucerSpawnMin);
  }
}

function updateFX(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.985;p.vy*=.985;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=debris.length-1;i>=0;i--){
    const d=debris[i];
    d.x+=d.vx*dt;d.y+=d.vy*dt;d.a+=d.spin*dt;d.life-=dt;wrap(d,8);
    if(d.life<=0)debris.splice(i,1);
  }
}

function collide(){
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    if(b.owner==='ship'){
      let hit=false;
      for(let ai=asteroids.length-1;ai>=0;ai--){
        const a=asteroids[ai];
        if(dist2(b,a)<(a.r+4)*(a.r+4)){asteroids.splice(ai,1);bullets.splice(bi,1);split(a);hit=true;break;}
      }
      if(hit)continue;
      for(let si=saucers.length-1;si>=0;si--){
        const s=saucers[si];
        if(dist2(b,s)<(s.r+5)*(s.r+5)){
          bullets.splice(bi,1);
          const kind=s.kind||'L';
          addScore(CFG.saucerScore[kind]||200);
          spark(s.x,s.y,kind==='S'?22:16,'#fff',kind==='S'?260:200);
          beep('boom',kind==='S'?'M':'L');
          saucers.splice(si,1);
          if(!saucers.length)stopSaucerSound();
          break;
        }
      }
    }else if(!ship.dead&&ship.hyper<=0&&dist2(b,ship)<(CFG.shipR+3)*(CFG.shipR+3)){bullets.splice(bi,1);damage();}
  }
  if(ship.dead||ship.hyper>0)return;
  for(let ai=asteroids.length-1;ai>=0;ai--){
    const a=asteroids[ai];
    if(dist2(ship,a)<(a.r+CFG.shipR*.72)*(a.r+CFG.shipR*.72)){asteroids.splice(ai,1);split(a);damage();}
  }
  for(let si=saucers.length-1;si>=0;si--){
    const s=saucers[si];
    if(dist2(ship,s)<(s.r+CFG.shipR)*(s.r+CFG.shipR)){
      const kind=s.kind||'L';
      // ramming saucer: no points in original when you die — keep 0 score, just kill both threats
      saucers.splice(si,1);if(!saucers.length)stopSaucerSound();
      spark(s.x,s.y,28,'#fff',260);beep('boom','M');damage();
    }
  }
}

function drawAst(a){
  ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.a);
  ctx.strokeStyle='#d8d8d8';ctx.lineWidth=1.5;ctx.lineJoin='round';
  ctx.shadowColor='#fff';ctx.shadowBlur=CFG.vectorGlow;
  ctx.beginPath();
  a.verts.forEach((p,i)=>{const x=Math.cos(p.ang)*p.rad,y=Math.sin(p.ang)*p.rad;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.closePath();ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}
function drawSaucer(s){
  ctx.save();ctx.translate(s.x,s.y);
  ctx.strokeStyle='#eee';ctx.lineWidth=1.5;ctx.shadowColor='#fff';ctx.shadowBlur=CFG.vectorGlow;
  const sc=s.kind==='S'?0.62:1;
  ctx.scale(sc,sc);
  ctx.beginPath();ctx.ellipse(0,0,22,8,0,0,TAU);ctx.stroke();
  ctx.beginPath();ctx.ellipse(0,-5,10,6,0,Math.PI,TAU);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-14,2);ctx.lineTo(-18,8);ctx.moveTo(14,2);ctx.lineTo(18,8);ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}
function drawShipIcon(x,y,scale){
  ctx.save();ctx.translate(x,y);ctx.rotate(-Math.PI/2);ctx.scale(scale,scale);
  ctx.strokeStyle='#fff';ctx.lineWidth=1.4/scale;
  ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(-7,-6);ctx.lineTo(-4,0);ctx.lineTo(-7,6);ctx.closePath();ctx.stroke();
  ctx.restore();
}
function drawShip(){
  if(!ship||ship.dead||ship.hyper>0)return;
  ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.a);
  if(ship.inv>0&&Math.floor(ship.inv*12)%2===0)ctx.globalAlpha=.35;
  ctx.strokeStyle='#fff';ctx.lineWidth=1.6;ctx.lineJoin='round';
  ctx.shadowColor='#9ff';ctx.shadowBlur=CFG.vectorGlow;
  ctx.beginPath();
  ctx.moveTo(18,0);ctx.lineTo(-12,-10);ctx.lineTo(-7,0);ctx.lineTo(-12,10);
  ctx.closePath();ctx.stroke();
  if(keys.thrust){
    ctx.strokeStyle='#fc8';ctx.beginPath();
    ctx.moveTo(-12,-5);ctx.lineTo(-24+(RAND()*4),0);ctx.lineTo(-12,5);
    ctx.stroke();
  }
  ctx.restore();
  if(ship.inv>0){
    ctx.strokeStyle='rgba(180,220,255,.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(ship.x,ship.y,24,0,TAU);ctx.stroke();
  }
}
function drawDebris(){
  for(const d of debris){
    ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.a);
    ctx.globalAlpha=Math.max(0,Math.min(1,d.life));
    ctx.strokeStyle='#fff';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(d.x1,d.y1);ctx.lineTo(d.x2,d.y2);ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawDebug(){
  if(!DEBUG)return;
  const lines=[
    'DEBUG FPS '+fps,
    'AST '+asteroids.length+' SAU '+saucers.length,
    'BUL '+bullets.length+' PAR '+particles.length,
    'SCR '+score+' LVL '+level+' LIVES '+lives,
    'VX '+(ship&&!ship.dead?ship.vx.toFixed(0):0)+' VY '+(ship&&!ship.dead?ship.vy.toFixed(0):0),
    'DEAD '+(ship&&ship.dead?1:0)+' HY '+(ship&&ship.hyper?ship.hyper.toFixed(2):0),
    'SAU '+(saucers[0]?saucers[0].kind:'-')+' T '+saucerTimer.toFixed(1),
    'ROCKS '+asteroids.map(a=>a.size||'?').join('')
  ];
  ctx.save();
  ctx.font='12px monospace';ctx.textAlign='left';ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(10,H-18*lines.length-16,200,18*lines.length+10);
  ctx.fillStyle='#0f0';
  lines.forEach((t,i)=>ctx.fillText(t,16,H-14-(lines.length-1-i)*16));
  ctx.restore();
}

function drawHUD(){
  ctx.shadowBlur=0;
  ctx.fillStyle='#eee';
  ctx.font='16px "Courier New",monospace';
  ctx.textAlign='left';
  ctx.fillText('SCORE '+score,16,28);
  ctx.fillText('HIGH '+high,16,50);
  // Pass 3: lives as mini ships (cabinet style)
  for(let i=0;i<lives;i++)drawShipIcon(22+i*18,72,1);
  ctx.textAlign='right';
  ctx.fillText('LEVEL '+level,W-16,28);
  if(paused||message||gameOver){
    ctx.textAlign='center';
    ctx.fillStyle=gameOver?'#f66':'#eee';
    ctx.font='28px "Courier New",monospace';
    ctx.fillText(paused?'PAUSED':message,W/2,H/2-16);
    ctx.font='14px "Courier New",monospace';
    ctx.fillStyle='#ccc';
    if(gameOver)ctx.fillText('PRESS ENTER / TAP FIRE',W/2,H/2+18);
  }
  drawDebug();
}

function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  if(CFG.fxStars){
    for(const s of stars){
      s.x-=(ship&&ship.vx||0)*.006*s.z;s.y-=(ship&&ship.vy||0)*.006*s.z;wrap(s,2);
      ctx.globalAlpha=.35+.45*s.z;ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.r,s.r);
    }
    ctx.globalAlpha=1;
  }
  for(const a of asteroids)drawAst(a);
  for(const s of saucers)drawSaucer(s);
  for(const b of bullets){
    ctx.fillStyle=b.owner==='ship'?'#fff':'#f88';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=CFG.vectorGlow;
    ctx.beginPath();ctx.arc(b.x,b.y,1.8,0,TAU);ctx.fill();
    ctx.shadowBlur=0;
  }
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;
  drawDebris();
  drawShip();
  drawHUD();
}

function loop(t){
  const dt=Math.min(.033,(t-last)/1000||.016);last=t;
  fpsFrames++;
  if(t-fpsLast>=1000){fps=fpsFrames;fpsFrames=0;fpsLast=t;}
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function setKey(k,v){
  if(k==='ArrowLeft'||k==='a'||k==='A')keys.left=v;
  if(k==='ArrowRight'||k==='d'||k==='D')keys.right=v;
  if(k==='ArrowUp'||k==='w'||k==='W')keys.thrust=v;
  if(k===' ')keys.fire=v;
}
addEventListener('keydown',e=>{
  initAudio();
  if(e.key==='p'||e.key==='P'){paused=!paused;if(paused)stopThrustSound();return;}
  if(e.key==='m'||e.key==='M'){
    muted=!muted;
    if(muted){stopThrustSound();stopSaucerSound();}
    return;
  }
  if(e.key==='Enter'&&gameOver){reset();return;}
  if(e.key==='h'||e.key==='H'||e.key==='Shift'){hyperspace();e.preventDefault();return;}
  setKey(e.key,true);if(e.key===' ')e.preventDefault();
});
addEventListener('keyup',e=>setKey(e.key,false));
document.querySelectorAll('.btn').forEach(el=>{
  const k=el.dataset.key;
  const on=e=>{
    e.preventDefault();initAudio();
    if(k==='fire'){keys.fire=true;shoot();}
    else if(k==='hyper'){hyperspace();}
    else keys[k]=true;
  };
  const off=e=>{e.preventDefault();if(k!=='hyper')keys[k]=false;};
  el.addEventListener('pointerdown',on);el.addEventListener('pointerup',off);
  el.addEventListener('pointercancel',off);el.addEventListener('pointerleave',off);
});
canvas.addEventListener('pointerdown',e=>{
  initAudio();if(gameOver){reset();return;}if(e.pointerType==='mouse')return;
  const x=e.clientX;if(x<W*.33)keys.left=true;else if(x>W*.66)keys.right=true;else{keys.thrust=true;shoot();}
});
canvas.addEventListener('pointerup',()=>{keys.left=keys.right=keys.thrust=false;});
reset();
})();
</script>
</body>
</html>
