<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Asteroids</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;touch-action:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Courier New',monospace;text-align:center;}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

<script>
'use strict';

const W = window.innerWidth, H = window.innerHeight;
const HALF_W = W / 2;
const SHIELD_COUNT = 8;
const SHIP_RADIUS = 16;
const BULLET_SPEED = -750;
const ASTEROID_DRIFT_MAX = 110;

// ─── Web Audio Sound Manager ────────────────────────────────────
class Sound {
  constructor(){ this.ctx=new(window.AudioContext||window.webkitAudioContext)(); this.gain=this.ctx.createGain(); this.gain.gain.value=0.25; this.gain.connect(this.ctx.destination); this.silent=false; }
  resume(){ if(this.ctx.state==='suspended')this.ctx.resume(); }
  shoot(){ if(this.silent)return;const g=this.ctx.createGain(),o=this.ctx.createOscillator();g.gain.value=0.3;g.connect(o);o.type='sawtooth'; o.frequency.setValueAtTime(2400,this.ctx.currentTime);o.frequency.exponentialRampToValueAtTime(600,this.ctx.currentTime+0.05); const env=this.ctx.createGain();env.gain.value=1;env.connect(g); g.connect(env); env.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.04); o.start(this.ctx.currentTime);o.stop(this.ctx.currentTime+0.05);}
  explode(){ if(this.silent)return; const buf=this.ctx.createBuffer(1,this.ctx.sampleRate*0.2,this.ctx.sampleRate),d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length); const s=this.ctx.createBufferSource();s.buffer=buf;const env=this.ctx.createGain();env.gain.value=1;s.connect(env); env.connect(this.gain); env.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.2); s.start(this.ctx.currentTime);}
  levelUp(){ if(this.silent)return;for(let i=3;i>=1;i--){setTimeout(()=>{const o=this.ctx.createOscillator(),g=this.ctx.createGain();g.gain.value=0.4;o.connect(g); g.connect(this.gain);o.type='sine';o.frequency.setValueAtTime(440*i,this.ctx.currentTime); const env=this.ctx.createGain();env.gain.value=0.3;env.connect(o); o.start(this.ctx.currentTime); env.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+0.25/i);o.stop(this.ctx.currentTime+0.3/i)},i*70)} }
  hit(){ if(this.silent)return; const g=this.ctx.createGain();g.gain.value=0.25;g.connect(this.ctx.destination);const o=this.ctx.createOscillator();o.type='square';o.frequency.value=1200;o.start(this.ctx.currentTime);o.stop(this.ctx.currentTime+0.03); g.connect(o);}
  loopTick(){ if(!this.silent){try{const g=this.ctx.createGain(),o=this.ctx.createOscillator();g.gain.value=0.04;o.type='sine'; o.frequency.value=62;g.connect(o);o.connect(g);g.connect(this.gain);o.start(this.ctx.currentTime);o.stop(this.ctx.currentTime+1/60);}catch(e){}} }
}

// ─── Phaser Scene ──────────────────────────────────────────────
const GameScene = Phaser.Scene.extend({
  preload(){ /* no assets needed — all procedural */ },
  create(){
    this.audio=new Sound();this.audio.resume();this.audio.loopTick();

    // ── Stars background ────────────────────────────────────
    this.stars=[];for(let i=0;i<160;i++){const s=this.add.circle(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),Math.abs(Math.random()*2-1)*1.5,'#fff',true);s.setAlpha(Math.abs(Math.random())*0.8+0.15);this.stars.push(s)}

    // ── Ship (triangle graphics) ───────────────────────────
    this.ship=this.add.graphics().setOrigin(0,0).setDepth(10);
    const drawShip=(angle)=>{const rad=Phaser.Math.DegToRad(angle);this.ship.clear();this.ship.lineStyle(2,0x0ff,1);this.ship.beginPath();this.ship.moveTo(W/2+Math.sin(rad)*SHIP_RADIUS,H/2-Math.cos(rad)*SHIP_RADIUS*0.5-8);this.ship.lineTo(W/2+Math.sin(rad+Phaser.Math.PI)*SHIP_RADIUS,H/2-Math.cos(rad+Phaser.Math.PI)*SHIP_RADIUS*0.5+6);this.ship.lineTo(W/2+Math.sin(rad+Phaser.Math.PI*Math.PI)*SHIP_RADIUS,H/2-Math.cos(rad+Phaser.Math.PI*Math.PI)*SHIP_RADIUS*0.5-4);this.ship.closePath();this.ship.strokePath()};
    drawShip(this.ship.angle);

    this.thrustGfx=this.add.graphics().setDepth(12);
    const drawThrust=(color)=>{const a=this.ship.angle;const r=Phaser.Math.DegToRad(a);const x=W/2+Math.sin(r)*SHIP_RADIUS*0.8,y=H/2-Math.cos(r)*SHIP_RADIUS*0.8-6*this.audio.silent;this.thrustGfx.clear();this.thrustGfx.lineStyle(1,color,0.4);this.thrustGfx.beginPath();this.thrustGfx.moveTo(x,y);this.thrustGfx.lineTo(x+Math.sin(a)*12,y-Math.cos(a)*12-3);this.thrustGfx.closePath();this.thrustGfx.strokePath()};

    // ── Shield indicators (8 hex slots) ─────────────────────
    this.shields=[];for(let i=0;i<SHIELD_COUNT;i++){const a=(i/8)*Math.PI*2;const sx=W/2+Math.cos(a)*55, sy=H/2+Math.sin(a)*55;this.add.circle(sx,sy,4.5,'#111',true);this.shields.push({x:sx,y:sy});}
    this.shieldSlots=[];for(let i=0;i<SHIELD_COUNT;i++){const a=(i/8)*Math.PI*2;const sx=W/2+Math.cos(a)*55,sy=H/2+Math.sin(a)*55;this.shieldSlots.push({x:sx,y:sy});}

    // ── Bullets pool ───────────────────────────────────────
    this.bullets=new Phaser.GameObjects.Group(this);

    // ── Asteroid groups per size ────────────────────────────
    const sizes=[{name:'large',radius:28},{name:'medium',radius:17},{name:'small',radius:10}];
    this.asteroids={};for(const sz of sizes){const g=new Phaser.GameObjects.Group(this);g.setDrag(0.9).setDamping(300);this.asteroids[sz.name]=g;g.setImmovable(sz.name==='large');}

    // ── Saucer group ────────────────────────────────────────
    this.saucers=new Phaser.GameObjects.Group(this);

    // ── Particle emitter (thrust trail) ──────────────────────
    const p=this.add.particles('circle');p.setSpeed(120).setAngle(Phaser.Math.Between(0,Math.PI*2)).setAlpha({min:0.3,max:0.8}).setScale(0.6,1).setColor(0xffaa00);
    this.thrustEmitter=p;

    // ── Collision flash emitter ──────────────────────────────
    const flash=this.add.particles('circle').setSpeed(250).setAlpha({min:0.4,max:0.9}).setScale(1,2).setColor(0xffffff);

    // ── Game state ──────────────────────────────────────────
    this.score=0;this.level=1;this.gameOver=false;this.shieldActive=true;
    this.shieldRemaining=Math.min(SHIELD_COUNT,Math.floor(Math.random()*SHIELD_COUNT)+2);
    this.lastShootTime=this.audio.ctx.currentTime;

    // ── Touch: left half = joystick, right half = shoot+tap ─
    this.joystick={active:false,cx:0,cy:0,maxR:Math.min(W*0.48,H/2)};
    this.shootActive=false;this.lastShoot=0;
    this.replayTapped=false;

    // Joystick handlers (left half)
    const jsStart=(pt)=>{if(this.joystick.active){pt.setActive(false);this.joystick.cx+=pt.x-this.joystick.cj;if(Math.abs(pt.y-this.joystick.cy)>5){return} else {this.joystick.cy=pt.y}}}; // placeholder — real init below
  },

  createJoystick(){
    if(this.gameOver) return;
    this.joystick.active=false;this.joystick.cx=this.joystick.cj=this.joystick.cy=0;
    const start=(pt)=>{if(this.joystick.active){pt.setActive(false);return} pt.setActive(true);this.joystick.active=true;this.joystick.originX=this.joystick.cj=pt.x-this.joystick.cx;this.joystick.originY=this.joystick.cy=pt.y};
    const move=(pt,dx,dy)=>{if(!this.joystick.active)return;const nx=pt.x+this.joystick.originX,ny=pt.y+this.joystick.originY,d=Math.sqrt(nx*nx+ny*ny);if(d>this.joystick.maxR){const a=Phaser.Math.Angle.Between(0.5*Math.PI,Phaser.Math.Atan2(ny,nx-this.joystick.originX));d=this.joystick.maxR;}pt.x=nx;pt.y=ny};
    const end=()=>{this.joystick.active=false;if(this.shootActive){this.shootActive=false} this.joystick.originX=this.joystick.cj=0;this.joystick.originY=this.joystick.cy=0};
    const touchLeft=(e)=>{const x=e.touches[0].clientX,y=e.touches[0].clientY;const rect=document.querySelector('canvas').getBoundingClientRect();if(x<rect.left+HALF_W){start({x:x-rect.left,y:y-rect.top})}};
    const moveLeft=(e)=>{const x=e.touches[0].clientX,y=e.touches[0].clientY;const rect=document.querySelector('canvas').getBoundingClientRect();if(this.joystick.active){move({x:x-rect.left,y:y-rect.top},0,0)}});
    const endLeft=()=>{end()};
    document.addEventListener('touchstart',e=>{if(e.touches[1]){e.preventDefault()} else touchLeft(e)},{passive:false});
    document.addEventListener('touchmove',e=>{if(this.joystick.active){e.preventDefault();const x=e.touches[0].clientX,y=e.touches[0].clientY;const rect=document.querySelector('canvas').getBoundingClientRect();move({x:x-rect.left,y:y-rect.top},0,0)}},{passive:false});
    document.addEventListener('touchend',()=>{if(this.joystick.active) end()});

    // Mouse fallback
    const mStart=(e)=>{const mx=e.clientX*0.5/myScale,my=e.clientY*0.5;start({x:mx,y:my})};
    const mMove=(e)=>{move({x:e.clientX*0.5/myScale,y:e.clientY*0.5},0,0)};
    const mEnd=()=>{end()};
    // compute scale once
    this._initJoystickListeners();
  },

  _initJoystickListeners(){
    const start=(pt)=>{if(this.joystick.active){pt.setActive(false);return} pt.setActive(true);this.joystick.active=true;this.joystick.originX=this.joystick.cj=pt.x-this.joystick.cx;if(Math.abs(pt.y-this.joystick.cy)>5){return}else this.joystick.cy=pt.y};
    const move=(pt,dx,dy)=>{if(!this.joystick.active)return;const nx=pt.x+this.joystick.originX,ny=pt.y+this.joystick.originY,d=Math.sqrt(nx*nx+ny*ny);if(d>this.joystick.maxR){const a=Phaser.Math.Angle.Between(0.5*Math.PI,Phaser.Math.Atan2(ny,nx-this.joystick.originX));d=this.joystick.maxR;}pt.x=nx;pt.y=ny};
    const end=()=>{this.joystick.active=false;if(this.shootActive){this.shootActive=false} this.joystick.originX=this.joystick.cj=0;this.joystick.originY=this.joystick.cy=0};

    document.addEventListener('touchstart',e=>{if(!this.gameOver&&e.touches[1]){e.preventDefault();const t=e.touches[0];start({x:t.clientX*0.5,y:t.clientY*0.5})}},{passive:false});
    document.addEventListener('touchmove',e=>{if(this.joystick.active){e.preventDefault()};if(this.shootActive&&this.joystick.active){this.shootActive=false} if(this.gameOver)return;const t=e.touches[0];move({x:t.clientX*0.5,y:t.clientY*0.5},0,0)}},{passive:false});
    document.addEventListener('touchend',()=>{if(!this.gameOver&&this.joystick.active) end()});

    document.addEventListener('mousedown',e=>{const mx=e.clientX*0.5/myScale,my=e.clientY*0.5;start({x:mx,y:my})});
    document.addEventListener('mousemove',e=>{move({x:e.clientX*0.5/myScale,y:e.clientY*0.5},0,0)});
    document.addEventListener('mouseup',()=>{if(!this.gameOver&&this.joystick.active) end()});

    // Right-half: shoot button + tap-to-restart
    const shootStart=(e)=>{const mx=e.clientX*0.5/myScale,my=e.clientY*0.5;if(mx>HALF_W){this.shootActive=true;this.lastShoot=this.audio.ctx.currentTime}};
    const shootMove=(e)=>{if(this.joystick.active)return;move({x:e.clientX*0.5/myScale,y:e.clientY*0.5},0,0)};
    const shootEnd=()=>{this.shootActive=false};

    document.addEventListener('mousedown',e=>{if(!this.gameOver){const mx=e.clientX*0.5/myScale,my=e.clientY*0.5;if(mx>HALF_W)shootStart(e)}});
    document.addEventListener('mouseup',()=>{if(this.joystick.active&&!this.shootActive){end()}else if(this.shootActive&&e.touches[0]){}try{shootEnd()}{catch(e){}}});

    // Mouse down/up for shoot button
    let shootDown=false;document.addEventListener('mousedown',e=>{if(!this.gameOver){const mx=e.clientX*0.5/myScale,my=e.clientY*0.5;if(mx>HALF_W&&!this.joystick.active){shootDown=true;start({x:mx,y:my})}}});
    document.addEventListener('mouseup',()=>{if(shootDown&&!this.shootActive){end()} if(this.shootActive) shootEnd()});

    // Restart tap anywhere on right half or overlay
    document.addEventListener('click',e=>{const mx=e.clientX*0.5/myScale,my=e.clientY*0.5;if(mx>HALF_W&&this.gameOver){Phaser.Scene.prototype.scene='Restart'}},false);
  },

  update(time,delta){
    if(this.gameOver||this.levelUp)return; this._initJoystickListeners();
    myScale=1; // simplify — no scaling in this version

    // ── Joystick input → ship velocity + thrust trail ───────
    if(!this.joystick.active&&this.shootActive){return}
    const dx=this.joystick.cx-this.joystick.originX,dy=this.joystick.cj-this.joystick.originY;
    let vx=dx*0.5,vy=(H/2-this.joystick.cy)*1.6; // scale Y for tilt feel

    // Ship thrust: apply force along ship heading + lateral drift
    const thrAngle=this.ship.angle-Phaser.Math.PI/2;
    const fx=Math.cos(thrAngle)*(dx*0.3+200), fy=Math.sin(thrAngle)*(-vy*1.8)+dy*0.5;
    this.ship.body.applyForce(fx,fy,delta*2);

    // Ship turn: rotate toward facing direction when moving forward, or use tilt input
    if(Math.abs(this.ship.body.velocity.x)>3||Math.abs(this.ship.body.velocity.y)>3){
      const desiredAngle=Phaser.Math.Angle.WrapDegrees(Phaser.Math.Atan2(-vy*1.5,-vx));
      this.ship.angle+=Phaser.Math.DegToRad((desiredAngle-this.ship.angle)*0.08);
    }

    // Thrust particles — emit at ship back when moving
    if(Math.abs(this.ship.body.velocity.x)>3||Math.abs(this.ship.body.velocity.y)>3){
      const ax=this.ship.x+Math.cos(thrAngle)*SHIP_RADIUS*0.7,ay=this.ship.y-Math.sin(thrAngle)*SHIP_RADIUS*0.5;
      for(let i=0;i<4;i++){this.thrustEmitter.emitParticle(ax+i*Math.random()*20-10,ay+(i%2?0:2),0,Phaser.Math.Angle.WrapDegrees(this.ship.angle));}
    }

    // ── Wrap-around edges (classic Asteroids) ───────────────
    this.wrapAround();

    // ── Shoot bullet when shooting active + cooldown ───────
    if(this.shootActive&&this.audio.ctx.currentTime-this.lastShoot>0.18){
      const bx=this.ship.x+Math.cos(this.ship.angle)*SHIP_RADIUS*0.5,by=this.ship.y-Math.sin(this.ship.angle)*SHIP_RADIUS*0.5;
      this.bullets.create(bx,by).setCircle(3).setAlpha(1);
      // Velocity perpendicular to ship heading
      const bx2=bx+Math.cos(this.ship.angle-Phaser.Math.PI/2)*BULLET_SPEED*Math.sqrt(dx*dx+dy*dy)/60;
      this.bullets.setVelocity(Math.cos(this.ship.angle-Phaser.Math.PI/4)*(300), Math.sin(this.ship.angle-Phaser.Math.PI/4)*(300));
      this.lastShoot=this.audio.ctx.currentTime;this.audio.shoot();
    }

    // ── Shield regeneration ────────────────────────────────
    if(!this.shieldActive&&this.shieldRemaining>0){
      const regenDelay=Math.max(150,250-this.level*20);
      this.shieldTimer||(this.shieldTimer=setTimeout(()=>{this.shieldActive=true;this.updateShields()},regenDelay));
    }

    // ── Spawn asteroids on edge when none exist ─────────────
    const spawnLarge=(()=>{if(this.asteroids.large.count>0||Math.random()<0.45)return;const a=Phaser.Math.Between(1,6);while(a>0&&this.asteroids.large.count>0){a--;}if(a===0&&this.asteroids.large.count>0)return;}
    // Pick random edge point — wrap around: x between 0 and W/2, y between -H/2 and H/2
    const ax=Phaser.Math.Between(1,Math.floor(W/3)),ay=Phaser.Math.Between(-H*0.75,H*0.75);
    this.createAsteroid(ax,ay,true);});

    // ── Spawn saucer periodically ───────────────────────────
    if(Date.now()%this.saucerInterval===0&&Math.random()<0.4){this.spawnSaucer();}

    // ── Draw shields ───────────────────────────────────────
    for(let i=0;i<SHIELD_COUNT;i++){const s=this.shieldSlots[i];if(this.shields[i].active){this.add.circle(s.x,s.y,5,this.shields[i].value>0?{r:0,g:1,b:1,a:1}:null,true);}}

    // ── Level up after clearing large asteroids (score 30) ──
    if(this.score>=60&&!this.levelUp){this.createLevelScreen();}

    // ── Update star twinkle ────────────────────────────────
    for(let i=0;i<this.stars.length;i++){if(Math.random()<0.02&&this.stars[i].alpha<0.7){this.stars[i].alpha=Math.abs(Math.random())*0.6+0.15;}}

    // ── Update shield circles (draw overlays when active)──
  },

  wrapAround(){
    const hw=W/2,hh=H/2;for(const a of[this.ship,...this.bullets.getArray(),...this.asteroids.large.getArray(),...this.asteroids.medium.getArray(),...this.asteroids.small.getArray()]){if(a.x>W){a.x=0;a.body.velocity.y-=30;} if(a.x<0){a.x=W;a.body.velocity.y+=30;} if(a.y>-hh){a.y=2*hh-a.y; a.body.velocity.x-=25;} if(a.y>hh){a.y=-2*hh+a.y; a.body.velocity.x+=25;}}}

  createAsteroid(ax,ay,isLarge){
    const sz=this.asteroids.isLarge?this.asteroids.large:this.asteroids.medium||this.asteroids.small;
    if(sz.count>0&&Math.random()<0.3)return this.asteroids.large||this.asteroids.medium||this.asteroids.small;
    // random vertices for irregular shape
    const verts=[];for(let i=0;i<5;i++){const a=Phaser.Math.DegToRad(72*i+Math.random()*18);verts.push([ax+a*1.3*Math.cos(Math.random()),ay+a*1.3*Math.sin(Math.random())]);}
    return sz.create(ax,ay).setPolygon(verts).setSize(sz.radius*2,sz.radius*2).setAlpha(0.7+Math.random()*0.3);
  },

  spawnSaucer(){const sx=Phaser.Math.Between(-15,W/2),sy=H*0.85;this.saucers.create(sx,sy).setEllipse(4,9).setColor(0x666).setAlpha(0.7);},

  createLevelScreen(){const ov=this.add.rectangle(0,0,W,H,0).setAlpha(0.35);this.add.text(W/2,H/2-30,'LEVEL UP!',{fontSize:48,color:'#ff0',fontFamily:'Courier New'}).setOrigin(0.5).setTint(0xffaa00);this.audio.levelUp();},

  updateShields(){for(let i=0;i<SHIELD_COUNT;i++){if(this.shieldSlots[i].active){const d=this.shields[i];d.active=false;}}}
};

</script>
<script>
// ─── Phaser Game init ────────────────────────────────────────
const cfg={type:Phaser.AUTO,width:window.innerWidth,height:window.innerHeight,backgroundColor:'#000',physics:{arcade:{gravity:{x:0,y:0}}},scene:[GameScene]};
new Phaser.Game(cfg);

// Prevent default touch behaviors
document.addEventListener('touchmove',e=>{if(e.target.tagName!=='CANVAS')e.preventDefault()},false);
</script>
</body>
</html>
