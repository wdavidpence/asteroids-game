<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Asteroids</title>
<style>
/* iOS Safari: avoid 100vw/100vh overflow (causes pan/zoom feel). Use fixed full-bleed. */
html,body{
  margin:0;padding:0;width:100%;height:100%;
  overflow:hidden;overscroll-behavior:none;
  background:#000;color:#fff;
  font-family:"Courier New",Courier,monospace;
  /* manipulation kills double-tap zoom; none also blocks pan */
  touch-action:none;user-select:none;-webkit-user-select:none;
  position:fixed;inset:0;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
}
canvas#game{
  display:block;position:fixed;left:0;top:0;right:0;bottom:0;
  width:100%;height:100%;
  background:#000;touch-action:none;
  -webkit-touch-callout:none;
}
.hint{position:fixed;left:12px;bottom:10px;color:#9aa;font-size:12px;opacity:.75;pointer-events:none;z-index:2}
/* Pass 9 — cabinet-on-glass mobile controls */
.btn{
  position:fixed;z-index:5;box-sizing:border-box;
  width:72px;height:72px;border:1px solid rgba(160,200,255,.55);border-radius:50%;
  background:rgba(20,40,80,.32);color:#dfefff;font-weight:700;font-size:22px;
  display:none;align-items:center;justify-content:center;
  /* critical on iOS: disable double-tap zoom on repeated rotate taps */
  touch-action:none;
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
  -webkit-touch-callout:none;
  bottom:calc(18px + env(safe-area-inset-bottom,0px));
}
.btn:active{background:rgba(80,140,255,.38);border-color:#9cf}
.left{left:calc(16px + env(safe-area-inset-left,0px))}
.right{left:calc(100px + env(safe-area-inset-left,0px))}
.fire{right:calc(16px + env(safe-area-inset-right,0px))}
.thrust{right:calc(100px + env(safe-area-inset-right,0px))}
.hyper{
  right:calc(16px + env(safe-area-inset-right,0px));
  bottom:calc(108px + env(safe-area-inset-bottom,0px));
  width:58px;height:58px;font-size:13px;letter-spacing:1px;opacity:.92
}
@media(pointer:coarse){
  .btn{display:flex}
  .hint{display:none}
  .btn{width:76px;height:76px}
  .hyper{width:64px;height:64px}
}
@media(pointer:coarse) and (orientation:landscape){
  .btn{width:64px;height:64px;bottom:calc(12px + env(safe-area-inset-bottom,0px))}
  .hyper{width:54px;height:54px;bottom:calc(88px + env(safe-area-inset-bottom,0px))}
  .left{left:calc(12px + env(safe-area-inset-left,0px))}
  .right{left:calc(84px + env(safe-area-inset-left,0px))}
  .fire{right:calc(12px + env(safe-area-inset-right,0px))}
  .thrust{right:calc(84px + env(safe-area-inset-right,0px))}
  .hyper{right:calc(12px + env(safe-area-inset-right,0px))}
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hint">←/→ rotate · ↑/W thrust · Space fire · H/Shift hyperspace · M mute · P pause · Enter restart · ?debug=1</div>
<div class="btn left" data-key="left" aria-label="rotate left">⟲</div>
<div class="btn right" data-key="right" aria-label="rotate right">⟳</div>
<div class="btn thrust" data-key="thrust" aria-label="thrust">▲</div>
<div class="btn fire" data-key="fire" aria-label="fire">●</div>
<div class="btn hyper" data-key="hyper" aria-label="hyperspace">HS</div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const TAU=Math.PI*2,RAND=Math.random;
// Pass 2 physics (near-frictionless) + Pass 3 lives model
const CFG={
  rot:4.2,
  thrust:280,
  friction:1.0,          // classic: no drag (Pass 2)
  maxSpeed:520,          // soft cap so phone runs stay controllable
  bulletSpeed:520,
  bulletLife:1.05,
  bulletCd:0.18,
  maxBullets:4,          // original-ish simultaneous shots
  shipR:14,
  invuln:2.2,
  startLives:3,
  extraLifeEvery:10000,
  respawnDelay:2.0,
  // Pass 4 — classic rock economy
  rockR:{L:42,M:22,S:11},
  rockScore:{L:20,M:50,S:100},
  rockSpeed:{L:45,M:85,S:130},
  rockChildJitter:0.55,
  // Pass 5 — hyperspace
  hyperFailChance:1/6,
  hyperDelay:0.35,
  hyperCooldown:0.85,
  // Pass 6 — dual saucers
  saucerScore:{L:200,S:1000},
  saucerOnlySmallAt:40000,
  saucerSpawnMin:8,
  saucerSpawnMax:16,
  // Pass 7 — audio pacing
  beatMinInterval:0.85,
  beatMaxInterval:0.28,
  // Pass 8 — difficulty curve
  waveBaseRocks:4,
  waveRockCap:11,
  waveClearDelay:0.85,     // brief calm between waves
  rockSpeedScaleCap:1.55,  // speed multiplier plateaus
  saucerSpawnFloor:5.5,    // min spawn interval late game
  mobileMaxSpeed:460,      // softer speed cap on coarse pointers
  maxParticles:220,         // Pass 11 hardening
  attractRocks:5,
  fxStars:false,
  vectorGlow:2
};
const DEBUG=new URLSearchParams(location.search).get('debug')==='1';
const COARSE=typeof matchMedia==='function'&&matchMedia('(pointer:coarse)').matches;
let W=0,H=0,DPR=1,last=0,paused=false,gameOver=false,level=1,score=0,high=+localStorage.asteroidsHighScore||0;
let lives=CFG.startLives,nextExtraAt=CFG.extraLifeEvery,respawnT=0;
// Pass 10: title/attract | play | over
let mode='title',blinkT=0,attractAI=0;
let keys={left:false,right:false,thrust:false,fire:false},stars=[],ship,bullets=[],asteroids=[],particles=[],saucers=[],debris=[],lastShot=0,message='';
let lastHyper=0,saucerTimer=12,wavePause=0;
let audio,thrustNodes=null,saucerNodes=null,beatT=0,beatHi=false,muted=false;
let fps=0,fpsFrames=0,fpsLast=performance.now(),pageHidden=false;
// Stable layout lock — ignore Safari chrome show/hide height jiggle (looks like zoom on tap)
let layoutW=0,layoutH=0,lastTouchEnd=0;

function effectiveMaxSpeed(){
  return COARSE?CFG.mobileMaxSpeed:CFG.maxSpeed;
}
function rockSpeedMult(){
  // rises with level then soft-caps (original-ish plateau feel)
  return Math.min(CFG.rockSpeedScaleCap,1+(level-1)*0.06);
}
function waveRockCount(){
  return Math.min(CFG.waveBaseRocks+level-1,CFG.waveRockCap);
}
function saucerInterval(){
  // shorter waits as score/level rise, floor for fairness
  const t=CFG.saucerSpawnMax-Math.min(7,level*0.35+score/25000);
  return Math.max(CFG.saucerSpawnFloor,t)+(RAND()*(CFG.saucerSpawnMax-CFG.saucerSpawnMin)*0.35);
}

function readViewportSize(){
  const vv=window.visualViewport;
  // Prefer layout viewport for height stability; visualViewport height jumps when URL bar toggles
  const cssW=Math.max(1,Math.floor(window.innerWidth||document.documentElement.clientWidth||(vv&&vv.width)||320));
  // Use the larger of visual vs layout height so first paint fills screen; lock later
  const hLayout=Math.floor(window.innerHeight||document.documentElement.clientHeight||480);
  const hVisual=Math.floor((vv&&vv.height)||hLayout);
  const cssH=Math.max(1,Math.max(hLayout,hVisual));
  return {cssW,cssH};
}

function resize(force){
  const {cssW,cssH}=readViewportSize();
  const widthChanged=!layoutW||Math.abs(cssW-layoutW)>=2;
  const heightChanged=!layoutH||Math.abs(cssH-layoutH)>=2;
  // Orientation / first layout only — ignore small height-only chrome changes after lock
  if(!force&&layoutW&&layoutH){
    if(!widthChanged&&Math.abs(cssH-layoutH)<120){
      // chrome toggle only — keep locked playfield so controls don't "zoom"
      return;
    }
  }
  // On width change (rotate), take new size; on big height change too
  layoutW=cssW;
  if(force||widthChanged||!layoutH||Math.abs(cssH-layoutH)>=120){
    layoutH=cssH;
  }
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=layoutW;H=layoutH;
  canvas.width=Math.floor(W*DPR);
  canvas.height=Math.floor(H*DPR);
  // Always pin to top-left of layout viewport — NEVER follow visualViewport.offset*
  // (offset jumps on tap and feels exactly like zoom-in on left control)
  canvas.style.left='0px';
  canvas.style.top='0px';
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(CFG.fxStars){
    stars=Array.from({length:140},()=>({x:RAND()*W,y:RAND()*H,z:.25+RAND()*1.2,r:RAND()*1.7}));
  }else stars=[];
  window.scrollTo(0,0);
}
addEventListener('resize',()=>resize(false),{passive:true});
addEventListener('orientationchange',()=>{
  layoutW=0;layoutH=0; // force re-measure after rotate
  setTimeout(()=>resize(true),50);
  setTimeout(()=>resize(true),300);
},{passive:true});
if(window.visualViewport){
  // Only react to genuine size changes; still gated inside resize()
  visualViewport.addEventListener('resize',()=>resize(false),{passive:true});
  // Do NOT listen to visualViewport scroll — that repositions with offset and causes jump/zoom feel
}
function killScroll(){if(window.scrollY||window.scrollX)window.scrollTo(0,0);}
addEventListener('scroll',killScroll,{passive:true});
// Block pinch + double-tap zoom (iOS still double-tap zooms controls sometimes)
addEventListener('gesturestart',e=>{e.preventDefault();},{passive:false});
addEventListener('gesturechange',e=>{e.preventDefault();},{passive:false});
addEventListener('touchmove',e=>{
  // prevent page pan/zoom; allow single-finger game controls
  if(e.touches&&e.touches.length>1)e.preventDefault();
  else if(e.target===document.body||e.target===document.documentElement||e.target===canvas)e.preventDefault();
},{passive:false});
// Quash double-tap-to-zoom on rapid control taps (left rotate especially)
addEventListener('touchend',e=>{
  const now=performance.now();
  if(now-lastTouchEnd<=350){
    e.preventDefault();
  }
  lastTouchEnd=now;
},{passive:false});
addEventListener('touchstart',e=>{
  // Keep document from focusing/zooming; buttons call preventDefault too
  if(e.touches&&e.touches.length>1)e.preventDefault();
},{passive:false});
resize(true);

function initAudio(){try{const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;audio=audio||new AC();if(audio.state==='suspended')audio.resume();}catch(e){}}

// Pass 7: one-shot SFX + size bangs + loops (thrust/saucer/beat)
function beep(type,size){
  if(muted)return;
  try{
    initAudio();if(!audio)return;
    const t=audio.currentTime;
    const blip=(freq0,freq1,dur,wave,gainPeak)=>{
      const o=audio.createOscillator(),g=audio.createGain();
      o.type=wave||'square';o.connect(g);g.connect(audio.destination);
      o.frequency.setValueAtTime(freq0,t);
      if(freq1)o.frequency.exponentialRampToValueAtTime(Math.max(1,freq1),t+dur);
      g.gain.setValueAtTime(.0001,t);
      g.gain.exponentialRampToValueAtTime(gainPeak||.18,t+.01);
      g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      o.start(t);o.stop(t+dur+.02);
    };
    if(type==='shoot')blip(1100,180,.09,'square',.16);
    else if(type==='boom'){
      // size-based bangs: L longer/lower, S short/higher
      const s=size||'M';
      if(s==='L')blip(90,28,.42,'sawtooth',.32);
      else if(s==='S')blip(180,50,.16,'sawtooth',.2);
      else if(s==='ship')blip(70,22,.55,'sawtooth',.35);
      else blip(120,35,.28,'sawtooth',.26);
    }
    else if(type==='hit')blip(420,90,.18,'triangle',.2);
    else if(type==='hyper')blip(200,900,.25,'sine',.14);
    else if(type==='extra'){
      [523,659,784,1046].forEach((f,i)=>{
        const oo=audio.createOscillator(),gg=audio.createGain(),tt=t+i*.07;
        oo.type='sine';oo.frequency.value=f;oo.connect(gg);gg.connect(audio.destination);
        gg.gain.setValueAtTime(.001,tt);gg.gain.exponentialRampToValueAtTime(.16,tt+.02);gg.gain.exponentialRampToValueAtTime(.001,tt+.2);
        oo.start(tt);oo.stop(tt+.22);
      });
    }else if(type==='level'){
      [392,523,659,784].forEach((f,i)=>{
        const oo=audio.createOscillator(),gg=audio.createGain(),tt=t+i*.09;
        oo.type='sine';oo.frequency.value=f;oo.connect(gg);gg.connect(audio.destination);
        gg.gain.setValueAtTime(.001,tt);gg.gain.exponentialRampToValueAtTime(.18,tt+.02);gg.gain.exponentialRampToValueAtTime(.001,tt+.25);
        oo.start(tt);oo.stop(tt+.28);
      });
    }else if(type==='beat'){
      blip(beatHi?90:55,beatHi?70:40,.08,'triangle',.12);
    }
  }catch(e){}
}

function setThrustSound(on){
  if(muted){stopThrustSound();return;}
  try{
    initAudio();if(!audio)return;
    if(on){
      if(thrustNodes)return;
      const o=audio.createOscillator(),g=audio.createGain(),f=audio.createBiquadFilter();
      o.type='sawtooth';o.frequency.value=55;
      f.type='lowpass';f.frequency.value=420;
      o.connect(f);f.connect(g);g.connect(audio.destination);
      g.gain.value=.0001;g.gain.exponentialRampToValueAtTime(.05,audio.currentTime+.05);
      o.start();
      thrustNodes={o,g};
    }else stopThrustSound();
  }catch(e){}
}
function stopThrustSound(){
  if(!thrustNodes||!audio)return;
  try{
    const t=audio.currentTime;
    thrustNodes.g.gain.cancelScheduledValues(t);
    thrustNodes.g.gain.setValueAtTime(Math.max(.0001,thrustNodes.g.gain.value),t);
    thrustNodes.g.gain.exponentialRampToValueAtTime(.0001,t+.05);
    thrustNodes.o.stop(t+.08);
  }catch(e){}
  thrustNodes=null;
}

function setSaucerSound(kind){
  // kind: null | 'L' | 'S'
  stopSaucerSound();
  if(!kind||muted)return;
  try{
    initAudio();if(!audio)return;
    const o1=audio.createOscillator(),o2=audio.createOscillator(),g=audio.createGain();
    o1.type='square';o2.type='square';
    // large = slower warble lower; small = faster higher
    if(kind==='L'){o1.frequency.value=180;o2.frequency.value=210;}
    else{o1.frequency.value=260;o2.frequency.value=320;}
    o1.connect(g);o2.connect(g);g.connect(audio.destination);
    g.gain.value=.0001;g.gain.exponentialRampToValueAtTime(.04,audio.currentTime+.08);
    // LFO-ish via periodic frequency wobble using oscillator detune automation loop
    const wob=()=>{
      if(!saucerNodes)return;
      const t=audio.currentTime;
      const a=kind==='L'?12:22,rate=kind==='L'?3:6;
      o1.frequency.setValueAtTime(o1.frequency.value,t);
      o1.frequency.linearRampToValueAtTime(o1.frequency.value+(RAND()-.5)*a*2,t+1/rate);
      setTimeout(wob,1000/rate);
    };
    o1.start();o2.start();saucerNodes={o1,o2,g,kind};wob();
  }catch(e){}
}
function stopSaucerSound(){
  if(!saucerNodes||!audio){saucerNodes=null;return;}
  try{
    const t=audio.currentTime;
    saucerNodes.g.gain.cancelScheduledValues(t);
    saucerNodes.g.gain.setValueAtTime(Math.max(.0001,saucerNodes.g.gain.value),t);
    saucerNodes.g.gain.exponentialRampToValueAtTime(.0001,t+.08);
    saucerNodes.o1.stop(t+.1);saucerNodes.o2.stop(t+.1);
  }catch(e){}
  saucerNodes=null;
}

function updateBeat(dt){
  if(muted||paused||gameOver)return;
  // faster beat as fewer rocks remain / higher level
  const danger=Math.min(1,level/10+(asteroids.length? (1/(1+asteroids.length))*0.7:0.9));
  const interval=CFG.beatMinInterval-(CFG.beatMinInterval-CFG.beatMaxInterval)*danger;
  beatT-=dt;
  if(beatT<=0){
    beatT=interval;
    beatHi=!beatHi;
    beep('beat');
  }
}

function wrap(o,r=0){if(o.x<-r)o.x=W+r;if(o.x>W+r)o.x=-r;if(o.y<-r)o.y=H+r;if(o.y>H+r)o.y=-r;}
function dist2(a,b){const x=a.x-b.x,y=a.y-b.y;return x*x+y*y;}

function addScore(n){
  const prev=score;
  score+=n;
  while(score>=nextExtraAt){
    lives++;
    nextExtraAt+=CFG.extraLifeEvery;
    message='EXTRA LIFE';
    setTimeout(()=>{if(message==='EXTRA LIFE')message='';},900);
    beep('extra');
  }
  return score-prev;
}

function makeShip(x,y,inv){
  return {x,y,vx:0,vy:0,a:-Math.PI/2,inv:inv||0,dead:false,hyper:0};
}

// Pass 10 — attract / title cabinet loop
function startTitle(){
  mode='title';gameOver=false;paused=false;score=0;level=1;lives=CFG.startLives;
  message='';debris=[];bullets=[];saucers=[];particles=[];
  stopSaucerSound();stopThrustSound();
  ship=makeShip(W/2,H*0.58,0);
  ship.inv=9999; // invulnerable demo ship
  asteroids=[];
  for(let i=0;i<CFG.attractRocks;i++){
    addAsteroid(RAND()*W,RAND()*H,'L');
  }
  // slow demo rocks
  for(const a of asteroids){a.vx*=0.45;a.vy*=0.45;}
  attractAI=0;blinkT=0;keys.left=keys.right=keys.thrust=keys.fire=false;
}
function startGame(){
  mode='play';
  keys.left=keys.right=keys.thrust=keys.fire=false;
  reset();
}
function goGameOver(){
  mode='over';gameOver=true;message='GAME OVER';
  stopThrustSound();stopSaucerSound();
  if(score>high){high=score;localStorage.asteroidsHighScore=high;}
}

function reset(){
  mode='play';
  gameOver=false;paused=false;level=1;score=0;message='';
  lives=CFG.startLives;nextExtraAt=CFG.extraLifeEvery;respawnT=0;debris=[];wavePause=0;
  saucerTimer=CFG.saucerSpawnMin+RAND()*(CFG.saucerSpawnMax-CFG.saucerSpawnMin);
  ship=makeShip(W/2,H/2,CFG.invuln);
  bullets=[];particles=[];saucers=[];
  stopSaucerSound();stopThrustSound();beatT=0.5;beatHi=false;
  spawnLevel();
}

function spawnLevel(){
  asteroids=[];
  // Pass 8: classic ramp 4→cap, only LARGE rocks
  const n=waveRockCount();
  for(let i=0;i<n;i++){
    const edge=Math.floor(RAND()*4);
    let x=edge===0?0:edge===1?W:RAND()*W,y=edge===2?0:edge===3?H:RAND()*H;
    if(Math.hypot(x-W/2,y-H/2)<Math.min(200,Math.min(W,H)*0.28)){x=(x+260)%W;y=(y+190)%H;}
    addAsteroid(x,y,'L');
  }
  saucerTimer=Math.min(saucerTimer,saucerInterval()*0.55);
  wavePause=0;
  message='LEVEL '+level;setTimeout(()=>{if(!gameOver&&message==='LEVEL '+level)message='';},1200);beep('level');
}
function addAsteroid(x,y,size,vx,vy){
  const r=CFG.rockR[size],mult=rockSpeedMult();
  // mobile: slightly slower rocks for readability
  const mobileMul=COARSE?0.9:1;
  const base=CFG.rockSpeed[size]*(0.85+RAND()*0.35)*mult*mobileMul;
  const a=RAND()*TAU,n=9+Math.floor(RAND()*5);
  const verts=Array.from({length:n},(_,i)=>({ang:i*TAU/n+(RAND()-.5)*0.12,rad:r*(.72+RAND()*.42)}));
  const spd=base+(size==='L'?level*1.5:size==='M'?level*2:level*2.5);
  asteroids.push({
    x,y,r,size,
    vx:vx!=null?vx*mobileMul:Math.cos(a)*spd,
    vy:vy!=null?vy*mobileMul:Math.sin(a)*spd,
    spin:(RAND()-.5)*1.8,a:RAND()*TAU,verts
  });
}

// Pass 6: large (dumb/200) vs small (aims/1000); only small after 40k
function pickSaucerKind(){
  if(score>=CFG.saucerOnlySmallAt)return 'S';
  // early: mostly large; late/high score: more small
  const pSmall=Math.min(0.75,0.15+score/80000+level*0.03);
  return RAND()<pSmall?'S':'L';
}
function spawnSaucer(forceKind){
  if(saucers.length)return;
  const kind=forceKind||pickSaucerKind();
  const side=RAND()<.5?-40:W+40;
  const speed=kind==='L'?70:120;
  saucers.push({
    kind,x:side,y:60+RAND()*(H-120),
    vx:side<0?speed:-speed,
    vy:(RAND()-.5)*(kind==='L'?40:70),
    r:kind==='L'?20:12,
    shoot:kind==='L'?1.6:0.9
  });
  setSaucerSound(kind);
}
function saucerShoot(s){
  if(!ship||ship.dead||ship.hyper>0)return;
  let a;
  if(s.kind==='L'){
    // large: mostly random / poor aim
    a=RAND()*TAU;
  }else{
    // small: aims at ship; accuracy tightens with score
    const toShip=Math.atan2(ship.y-s.y,ship.x-s.x);
    // error range shrinks from ~±0.9 rad down toward ~±0.05
    const errMax=Math.max(0.05,0.9-score/50000);
    a=toShip+(RAND()-.5)*2*errMax;
  }
  const spd=s.kind==='L'?280:380;
  bullets.push({x:s.x,y:s.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:2.0,owner:'saucer'});
  beep('shoot');
}

function shoot(){
  if(mode==='title'||mode==='over'||gameOver){startGame();return;}
  if(!ship||ship.dead||ship.hyper>0)return;
  const now=performance.now()/1000;
  if(now-lastShot<CFG.bulletCd||bullets.length>=CFG.maxBullets)return;
  lastShot=now;
  const nose={x:ship.x+Math.cos(ship.a)*CFG.shipR,y:ship.y+Math.sin(ship.a)*CFG.shipR};
  // Pass 2: fixed muzzle velocity (minimal ship-velocity inherit) for classic shot feel
  bullets.push({
    x:nose.x,y:nose.y,
    vx:Math.cos(ship.a)*CFG.bulletSpeed,
    vy:Math.sin(ship.a)*CFG.bulletSpeed,
    life:CFG.bulletLife,owner:'ship'
  });
  spark(nose.x,nose.y,3,'#fff',70);beep('shoot');
}
function spark(x,y,n,c='#fff',pow=160){
  // Pass 11: hard cap particles
  const room=Math.max(0,CFG.maxParticles-particles.length);
  n=Math.min(n,room);
  for(let i=0;i<n;i++){
    const a=RAND()*TAU,sp=RAND()*pow;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.35+RAND()*.55,max:.9,c,r:1+RAND()*2.2});
  }
}
function spawnDebris(x,y,a){
  // vector ship-break lines
  for(let i=0;i<6;i++){
    const ang=a+(i/6)*TAU+(RAND()-.5)*.4,len=6+RAND()*10,sp=40+RAND()*90;
    debris.push({
      x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
      a:RAND()*TAU,spin:(RAND()-.5)*6,life:.9+RAND()*.7,
      x1:-len*.5,y1:0,x2:len*.5,y2:0
    });
  }
  spark(x,y,40,'#fff',300);
}

// Pass 3: lethal hit → explode → lose life → respawn or game over
function damage(force){
  if(!ship||ship.dead||gameOver)return;
  if(!force&&(ship.inv>0||ship.hyper>0))return;
  ship.dead=true;ship.hyper=0;
  ship.vx=0;ship.vy=0;
  spawnDebris(ship.x,ship.y,ship.a);
  beep('boom','ship');
  stopThrustSound();
  lives--;
  if(lives<=0){
    goGameOver();respawnT=0;
  }else{
    respawnT=CFG.respawnDelay;
    message='';
  }
}

// Pass 5: hyperspace vanish → random reentry (1/6 self-destruct)
function hyperspace(){
  if(gameOver||paused||!ship||ship.dead||ship.hyper>0)return;
  const now=performance.now()/1000;
  if(now-lastHyper<CFG.hyperCooldown)return;
  lastHyper=now;
  ship.hyper=CFG.hyperDelay;
  ship.vx=0;ship.vy=0;
  stopThrustSound();
  beep('hyper');
}

function respawnShip(){
  ship=makeShip(W/2,H/2,CFG.invuln);
  respawnT=0;
  // clear enemy bullets near center so instant death on spawn is rarer
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(b.owner==='saucer'&&dist2(b,ship)<120*120)bullets.splice(i,1);
  }
}

function split(a){
  const size=a.size||(a.r>30?'L':a.r>16?'M':'S');
  addScore(CFG.rockScore[size]||100);
  spark(a.x,a.y,size==='L'?28:size==='M'?18:12,'#fff',size==='L'?260:180);beep('boom',size);
  const child=size==='L'?'M':size==='M'?'S':null;
  if(!child)return;
  for(let i=0;i<2;i++){
    const ang=RAND()*TAU,sp=CFG.rockSpeed[child]*(0.9+RAND()*0.4)+(level*2);
    const j=CFG.rockChildJitter*a.r;
    addAsteroid(
      a.x+(RAND()-.5)*j*2,
      a.y+(RAND()-.5)*j*2,
      child,
      Math.cos(ang)*sp,
      Math.sin(ang)*sp
    );
  }
}

function clampShipSpeed(){
  const sp=Math.hypot(ship.vx,ship.vy),cap=effectiveMaxSpeed();
  if(sp>cap){
    const k=cap/sp;
    ship.vx*=k;ship.vy*=k;
  }
}

function updateAttract(dt){
  blinkT+=dt;
  // gentle auto-pilot demo ship
  attractAI-=dt;
  if(attractAI<=0){
    attractAI=0.4+RAND()*1.2;
    keys.left=RAND()<0.35;keys.right=!keys.left&&RAND()<0.35;
    keys.thrust=RAND()<0.55;
  }
  if(keys.left)ship.a-=CFG.rot*0.55*dt;
  if(keys.right)ship.a+=CFG.rot*0.55*dt;
  if(keys.thrust){
    ship.vx+=Math.cos(ship.a)*CFG.thrust*0.45*dt;
    ship.vy+=Math.sin(ship.a)*CFG.thrust*0.45*dt;
    clampShipSpeed();
  }
  ship.x+=ship.vx*dt;ship.y+=ship.vy*dt;
  ship.vx*=0.995;ship.vy*=0.995; // soft attract drag so demo doesn't fly off forever
  wrap(ship,22);
  for(const a of asteroids){a.x+=a.vx*dt;a.y+=a.vy*dt;a.a+=a.spin*dt;wrap(a,a.r);}
  updateFX(dt);
  // no collide damage in attract
}

function update(dt){
  if(pageHidden)return;
  if(mode==='title'){updateAttract(dt);return;}
  if(mode==='over'){
    stopThrustSound();stopSaucerSound();
    updateFX(dt);
    // keep rocks drifting under GAME OVER
    for(const a of asteroids){a.x+=a.vx*dt;a.y+=a.vy*dt;a.a+=a.spin*dt;wrap(a,a.r);}
    return;
  }
  if(paused||gameOver){
    stopThrustSound();
    if(gameOver)stopSaucerSound();
    updateFX(dt);
    return;
  }

  updateBeat(dt);

  // respawn timer while dead
  if(ship.dead){
    stopThrustSound();
    respawnT-=dt;
    if(respawnT<=0&&lives>0)respawnShip();
  }else if(ship.hyper>0){
    // Pass 5: in hyperspace — invisible, no control/collision
    stopThrustSound();
    ship.hyper-=dt;
    if(ship.hyper<=0){
      ship.hyper=0;
      if(RAND()<CFG.hyperFailChance){
        // re-entry fail ≈ original 1/6
        ship.x=40+RAND()*(W-80);ship.y=40+RAND()*(H-80);
        damage(true);
      }else{
        ship.x=40+RAND()*(W-80);ship.y=40+RAND()*(H-80);
        ship.vx=0;ship.vy=0;
        ship.inv=Math.max(ship.inv,0.6);
      }
    }
  }else{
    if(keys.left)ship.a-=CFG.rot*dt;
    if(keys.right)ship.a+=CFG.rot*dt;
    if(keys.thrust){
      ship.vx+=Math.cos(ship.a)*CFG.thrust*dt;
      ship.vy+=Math.sin(ship.a)*CFG.thrust*dt;
      clampShipSpeed();
      setThrustSound(true);
      if(RAND()<.7)spark(ship.x-Math.cos(ship.a)*14,ship.y-Math.sin(ship.a)*14,1,'#fc6',60);
    }else setThrustSound(false);
    if(keys.fire)shoot();
    ship.x+=ship.vx*dt;ship.y+=ship.vy*dt;
    // friction 1.0 → no decay; keep pow for future tuning
    if(CFG.friction!==1){
      ship.vx*=Math.pow(CFG.friction,dt*60);
      ship.vy*=Math.pow(CFG.friction,dt*60);
    }
    wrap(ship,22);
    ship.inv=Math.max(0,ship.inv-dt);
  }

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;wrap(b,4);
    if(b.life<=0)bullets.splice(i,1);
  }
  for(const a of asteroids){a.x+=a.vx*dt;a.y+=a.vy*dt;a.a+=a.spin*dt;wrap(a,a.r);}
  for(let i=saucers.length-1;i>=0;i--){
    const s=saucers[i];
    s.x+=s.vx*dt;s.y+=s.vy*dt;
    // gentle vertical weave; small more twitchy
    s.vy+=Math.sin(performance.now()/(s.kind==='S'?280:500)+i)*(s.kind==='S'?35:18)*dt;
    if(s.y<30||s.y>H-30)s.vy*=-1;
    if(s.x<-80||s.x>W+80){saucers.splice(i,1);if(!saucers.length)stopSaucerSound();continue;}
    s.shoot-=dt;
    if(s.shoot<=0&&!ship.dead&&ship.hyper<=0){
      s.shoot=(s.kind==='L'?1.4+RAND()*1.2:0.55+RAND()*0.55);
      saucerShoot(s);
    }
  }
  // keep saucer tone in sync with alive saucer kind
  if(saucers.length&&(!saucerNodes||saucerNodes.kind!==saucers[0].kind))setSaucerSound(saucers[0].kind);
  if(!saucers.length&&saucerNodes)stopSaucerSound();

  updateFX(dt);
  if(!ship.dead&&ship.hyper<=0)collide();

  // Pass 8: wave clear gate + short inter-wave calm
  if(wavePause>0){
    wavePause-=dt;
    if(wavePause<=0){level++;spawnLevel();}
  }else if(asteroids.length===0&&!saucers.length){
    wavePause=CFG.waveClearDelay;
    message='WAVE CLEAR';
    setTimeout(()=>{if(message==='WAVE CLEAR')message='';},700);
  }

  // Pass 6/8 spawn timer (allows lurking meta if one rock left)
  saucerTimer-=dt;
  if(saucerTimer<=0&&!saucers.length&&asteroids.length>0&&wavePause<=0){
    spawnSaucer();
    saucerTimer=saucerInterval();
  }
}

function updateFX(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.985;p.vy*=.985;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=debris.length-1;i>=0;i--){
    const d=debris[i];
    d.x+=d.vx*dt;d.y+=d.vy*dt;d.a+=d.spin*dt;d.life-=dt;wrap(d,8);
    if(d.life<=0)debris.splice(i,1);
  }
}

function collide(){
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    if(b.owner==='ship'){
      let hit=false;
      for(let ai=asteroids.length-1;ai>=0;ai--){
        const a=asteroids[ai];
        if(dist2(b,a)<(a.r+4)*(a.r+4)){asteroids.splice(ai,1);bullets.splice(bi,1);split(a);hit=true;break;}
      }
      if(hit)continue;
      for(let si=saucers.length-1;si>=0;si--){
        const s=saucers[si];
        if(dist2(b,s)<(s.r+5)*(s.r+5)){
          bullets.splice(bi,1);
          const kind=s.kind||'L';
          addScore(CFG.saucerScore[kind]||200);
          spark(s.x,s.y,kind==='S'?22:16,'#fff',kind==='S'?260:200);
          beep('boom',kind==='S'?'M':'L');
          saucers.splice(si,1);
          if(!saucers.length)stopSaucerSound();
          break;
        }
      }
    }else if(!ship.dead&&ship.hyper<=0&&dist2(b,ship)<(CFG.shipR+3)*(CFG.shipR+3)){bullets.splice(bi,1);damage();}
  }
  if(ship.dead||ship.hyper>0)return;
  for(let ai=asteroids.length-1;ai>=0;ai--){
    const a=asteroids[ai];
    if(dist2(ship,a)<(a.r+CFG.shipR*.72)*(a.r+CFG.shipR*.72)){asteroids.splice(ai,1);split(a);damage();}
  }
  for(let si=saucers.length-1;si>=0;si--){
    const s=saucers[si];
    if(dist2(ship,s)<(s.r+CFG.shipR)*(s.r+CFG.shipR)){
      const kind=s.kind||'L';
      // ramming saucer: no points in original when you die — keep 0 score, just kill both threats
      saucers.splice(si,1);if(!saucers.length)stopSaucerSound();
      spark(s.x,s.y,28,'#fff',260);beep('boom','M');damage();
    }
  }
}

function drawAst(a){
  ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.a);
  ctx.strokeStyle='#d8d8d8';ctx.lineWidth=1.5;ctx.lineJoin='round';
  ctx.shadowColor='#fff';ctx.shadowBlur=CFG.vectorGlow;
  ctx.beginPath();
  a.verts.forEach((p,i)=>{const x=Math.cos(p.ang)*p.rad,y=Math.sin(p.ang)*p.rad;i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
  ctx.closePath();ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}
function drawSaucer(s){
  ctx.save();ctx.translate(s.x,s.y);
  ctx.strokeStyle='#eee';ctx.lineWidth=1.5;ctx.shadowColor='#fff';ctx.shadowBlur=CFG.vectorGlow;
  const sc=s.kind==='S'?0.62:1;
  ctx.scale(sc,sc);
  ctx.beginPath();ctx.ellipse(0,0,22,8,0,0,TAU);ctx.stroke();
  ctx.beginPath();ctx.ellipse(0,-5,10,6,0,Math.PI,TAU);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-14,2);ctx.lineTo(-18,8);ctx.moveTo(14,2);ctx.lineTo(18,8);ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();
}
function drawShipIcon(x,y,scale){
  ctx.save();ctx.translate(x,y);ctx.rotate(-Math.PI/2);ctx.scale(scale,scale);
  ctx.strokeStyle='#fff';ctx.lineWidth=1.4/scale;
  ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(-7,-6);ctx.lineTo(-4,0);ctx.lineTo(-7,6);ctx.closePath();ctx.stroke();
  ctx.restore();
}
function drawShip(){
  if(!ship||ship.dead||ship.hyper>0)return;
  ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.a);
  if(ship.inv>0&&Math.floor(ship.inv*12)%2===0)ctx.globalAlpha=.35;
  ctx.strokeStyle='#fff';ctx.lineWidth=1.6;ctx.lineJoin='round';
  ctx.shadowColor='#9ff';ctx.shadowBlur=CFG.vectorGlow;
  ctx.beginPath();
  ctx.moveTo(18,0);ctx.lineTo(-12,-10);ctx.lineTo(-7,0);ctx.lineTo(-12,10);
  ctx.closePath();ctx.stroke();
  if(keys.thrust){
    ctx.strokeStyle='#fc8';ctx.beginPath();
    ctx.moveTo(-12,-5);ctx.lineTo(-24+(RAND()*4),0);ctx.lineTo(-12,5);
    ctx.stroke();
  }
  ctx.restore();
  if(ship.inv>0){
    ctx.strokeStyle='rgba(180,220,255,.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(ship.x,ship.y,24,0,TAU);ctx.stroke();
  }
}
function drawDebris(){
  for(const d of debris){
    ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.a);
    ctx.globalAlpha=Math.max(0,Math.min(1,d.life));
    ctx.strokeStyle='#fff';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(d.x1,d.y1);ctx.lineTo(d.x2,d.y2);ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha=1;
}

function drawDebug(){
  if(!DEBUG)return;
  const lines=[
    'DEBUG FPS '+fps,
    'AST '+asteroids.length+' SAU '+saucers.length,
    'BUL '+bullets.length+' PAR '+particles.length,
    'SCR '+score+' LVL '+level+' LIVES '+lives,
    'VX '+(ship&&!ship.dead?ship.vx.toFixed(0):0)+' VY '+(ship&&!ship.dead?ship.vy.toFixed(0):0),
    'DEAD '+(ship&&ship.dead?1:0)+' HY '+(ship&&ship.hyper?ship.hyper.toFixed(2):0),
    'SAU '+(saucers[0]?saucers[0].kind:'-')+' T '+saucerTimer.toFixed(1),
    'ROCKS '+asteroids.map(a=>a.size||'?').join('')
  ];
  ctx.save();
  ctx.font='12px monospace';ctx.textAlign='left';ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(10,H-18*lines.length-16,200,18*lines.length+10);
  ctx.fillStyle='#0f0';
  lines.forEach((t,i)=>ctx.fillText(t,16,H-14-(lines.length-1-i)*16));
  ctx.restore();
}

function drawHUD(){
  ctx.shadowBlur=0;
  if(mode==='title'){
    // Pass 10 cabinet title
    ctx.textAlign='center';
    ctx.fillStyle='#fff';
    ctx.font='700 42px "Courier New",monospace';
    ctx.fillText('ASTEROIDS',W/2,H*0.28);
    ctx.font='16px "Courier New",monospace';
    ctx.fillStyle='#ccc';
    ctx.fillText('HIGH '+high,W/2,H*0.36);
    // blink insert-coin style prompt
    if(Math.floor(blinkT*2)%2===0){
      ctx.fillStyle='#eee';
      ctx.font='18px "Courier New",monospace';
      ctx.fillText(COARSE?'TAP FIRE TO START':'PRESS FIRE / ENTER',W/2,H*0.78);
    }
    ctx.font='12px "Courier New",monospace';
    ctx.fillStyle='#888';
    ctx.fillText('1 COIN  1 PLAY',W/2,H*0.86);
    drawDebug();
    return;
  }
  ctx.fillStyle='#eee';
  ctx.font='16px "Courier New",monospace';
  ctx.textAlign='left';
  ctx.fillText('SCORE '+score,16,28);
  ctx.fillText('HIGH '+high,16,50);
  // Pass 3: lives as mini ships (cabinet style)
  if(mode==='play')for(let i=0;i<lives;i++)drawShipIcon(22+i*18,72,1);
  ctx.textAlign='right';
  ctx.fillText('LEVEL '+level,W-16,28);
  if(paused||message||mode==='over'){
    ctx.textAlign='center';
    ctx.fillStyle=mode==='over'?'#f66':'#eee';
    ctx.font='28px "Courier New",monospace';
    ctx.fillText(paused?'PAUSED':message,W/2,H/2-16);
    ctx.font='14px "Courier New",monospace';
    ctx.fillStyle='#ccc';
    if(mode==='over')ctx.fillText(COARSE?'TAP FIRE — PLAY AGAIN':'PRESS FIRE / ENTER',W/2,H/2+18);
  }
  drawDebug();
}

function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);
  // subtle phosphor vignette (cabinet glass)
  const g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)*0.72);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  if(CFG.fxStars){
    for(const s of stars){
      s.x-=(ship&&ship.vx||0)*.006*s.z;s.y-=(ship&&ship.vy||0)*.006*s.z;wrap(s,2);
      ctx.globalAlpha=.35+.45*s.z;ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.r,s.r);
    }
    ctx.globalAlpha=1;
  }
  for(const a of asteroids)drawAst(a);
  for(const s of saucers)drawSaucer(s);
  for(const b of bullets){
    ctx.fillStyle=b.owner==='ship'?'#fff':'#f88';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=CFG.vectorGlow;
    ctx.beginPath();ctx.arc(b.x,b.y,1.8,0,TAU);ctx.fill();
    ctx.shadowBlur=0;
  }
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;
  drawDebris();
  if(mode!=='over'||!ship.dead)drawShip();
  drawHUD();
}

function loop(t){
  const dt=Math.min(.033,(t-last)/1000||.016);last=t;
  fpsFrames++;
  if(t-fpsLast>=1000){fps=fpsFrames;fpsFrames=0;fpsLast=t;}
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function setKey(k,v){
  if(k==='ArrowLeft'||k==='a'||k==='A')keys.left=v;
  if(k==='ArrowRight'||k==='d'||k==='D')keys.right=v;
  if(k==='ArrowUp'||k==='w'||k==='W')keys.thrust=v;
  if(k===' ')keys.fire=v;
}
addEventListener('keydown',e=>{
  initAudio();
  if(e.key==='p'||e.key==='P'){
    if(mode==='play'){paused=!paused;if(paused)stopThrustSound();}
    return;
  }
  if(e.key==='m'||e.key==='M'){
    muted=!muted;
    if(muted){stopThrustSound();stopSaucerSound();}
    return;
  }
  if(e.key==='Enter'||e.key===' '){
    if(mode==='title'||mode==='over'){startGame();e.preventDefault();return;}
  }
  if(mode!=='play')return;
  if(e.key==='h'||e.key==='H'||e.key==='Shift'){hyperspace();e.preventDefault();return;}
  setKey(e.key,true);if(e.key===' ')e.preventDefault();
});
addEventListener('keyup',e=>{if(mode==='play')setKey(e.key,false);});
document.querySelectorAll('.btn').forEach(el=>{
  const k=el.dataset.key;
  const on=e=>{
    // preventDefault stops iOS double-tap zoom + focus scroll on control taps
    if(e.cancelable)e.preventDefault();
    e.stopPropagation();
    initAudio();
    if(mode==='title'||mode==='over'){if(k==='fire'||k==='thrust'||k==='hyper'||k==='left'||k==='right')startGame();return;}
    if(k==='fire'){keys.fire=true;shoot();}
    else if(k==='hyper'){hyperspace();}
    else keys[k]=true;
  };
  const off=e=>{
    if(e.cancelable)e.preventDefault();
    if(k!=='hyper')keys[k]=false;
  };
  // Prefer touch* on touch devices so pointerdown doesn't double-fire the same tap
  const touchy=('ontouchstart' in window)||COARSE;
  if(touchy){
    el.addEventListener('touchstart',on,{passive:false});
    el.addEventListener('touchend',off,{passive:false});
    el.addEventListener('touchcancel',off,{passive:false});
  }else{
    el.addEventListener('pointerdown',on);
    el.addEventListener('pointerup',off);
    el.addEventListener('pointercancel',off);
    el.addEventListener('pointerleave',off);
  }
  el.addEventListener('contextmenu',e=>e.preventDefault());
});
canvas.addEventListener('pointerdown',e=>{
  initAudio();
  if(mode==='title'||mode==='over'){startGame();return;}
  if(e.pointerType==='mouse')return;
  // Pass 9: on coarse pointers, dedicated buttons handle input — skip zone-tap to avoid mis-rotate
  if(COARSE)return;
  const x=e.clientX;if(x<W*.33)keys.left=true;else if(x>W*.66)keys.right=true;else{keys.thrust=true;shoot();}
});
canvas.addEventListener('pointerup',()=>{if(!COARSE){keys.left=keys.right=keys.thrust=false;}});
canvas.addEventListener('touchstart',e=>{if(e.cancelable)e.preventDefault();},{passive:false});

// Pass 11: pause simulation when tab hidden
document.addEventListener('visibilitychange',()=>{
  pageHidden=document.hidden;
  if(pageHidden){stopThrustSound();stopSaucerSound();}
  else last=performance.now();
});

startTitle();
})();
</script>
</body>
</html>
