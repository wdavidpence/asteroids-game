<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Asteroids Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// ============================================================
// Asteroids Arcade - Complete Implementation
// ============================================================

const CONFIG = {
    width: 800, height: 600,
    shipSpeed: 400, thrustPower: 250, friction: 1.0,
    bulletSpeed: 700, bulletCooldown: 300, maxBullets: 3,
    asteroidCount: 8, asteroidSpawnRate: 60,
    shieldSlots: 8, shieldRegenTime: 5000,
    particleLife: 40, particleSpeed: 120,
    saucerHealth: 3, saucerSpeed: 80,
};

// ============================================================
// Procedural Sound Engine (Web Audio API)
// ============================================================
class SoundEngine {
    constructor(scene) {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.3;
        this.masterGain.connect(this.ctx.destination);
        this.enabled = true;
    }

    playTone(freq, duration, type = 'square', volume = 1) {
        if (!this.enabled) return;
        const ctx = this.ctx;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(ctx.currentTime + duration);
    }

    shoot() { this.playTone(880, 0.15, 'square', 0.6); }
    explosion() { this.playTone(100, 0.4, 'sawtooth', 0.7); }
    hitShield() { this.playTone(2000, 0.1, 'triangle', 0.5); }
    levelUp() {
        [523, 659, 784].forEach((f, i) => setTimeout(() => this.playTone(f, 0.2, 'sine', 0.4), i * 100));
    }
    gameOver() { this.playTone(150, 1.0, 'square', 0.8); }
}

// ============================================================
// Particle System for Engine Trails
// ============================================================
class ParticleSystem extends Phaser.Scene {
    constructor(scene) { super('Particles'); }
    create(scene) {
        this.particles = scene.add.particles('particles');
        return this.particles;
    }
}

// ============================================================
// Ship Class - Triangle Graphics + Shields
// ============================================================
class Ship extends Phaser.GameObjects.Container {
    constructor(scene, x, y) {
        super(scene, x || 400, y || 300);
        this.scene = scene;
        this.shieldSlots = CONFIG.shieldSlots;

        // Triangle body
        const g = scene.add.graphics();
        g.lineStyle(2, 0x00ffcc, 1);
        g.fillStyle(0x00ffcc, 0.9);
        const w = 30, h = 45;
        g.beginPath();
        g.moveTo(0, -h);
        g.lineTo(-w, h);
        g.lineTo(w, h);
        g.closePath();
        g.fillPath();
        g.strokePath();

        // Cockpit
        const cockpit = scene.add.graphics();
        cockpit.fillStyle(0x00ffcc, 0.5);
        cockpit.beginPath();
        cockpit.moveTo(0, -h + 8);
        cockpit.lineTo(-w/2 + 4, h - 10);
        cockpit.lineTo(w/2 - 4, h - 10);
        cockpit.closePath();
        cockpit.fillPath();

        this.add(g);
        this.add(cockpit);

        // Shield slots (8 hexagonal)
        this.shields = [];
        for (let i = 0; i < CONFIG.shieldSlots; i++) {
            const angle = Phaser.Math.DegToRad(i * 45 - 90);
            const sx = x + Math.cos(angle) * 38;
            const sy = y + Math.sin(angle) * 38;
            const slot = scene.add.circle(sx, sy, 6, 0x00ffcc, 0.4);
            this.shields.push(slot);
        }

        // State
        this.speed = 0;
        this.angle = 0;
        this.thrusting = false;
        this.alive = true;
        this.score = 0;
        this.level = 1;
    }

    update(time, delta) {
        if (!this.alive) return;

        // Thrust
        if (this.scene.input.keyboard.activeKey?. Phaser.Keyboard.A !== null && this.scene.input.keyboard.isDown('A')) {
            this.thrusting = true;
            const g = this.children[0];
            g.lineStyle(2, 0x00ffcc, 1);
            g.fillStyle(0x00ffcc, 0.9);
            g.beginPath();
            g.moveTo(0, -45);
            g.lineTo(-15, 30);
            g.lineTo(15, 30);
            g.closePath();
            g.fillPath();
            g.strokePath();
        } else {
            this.thrusting = false;
            const g = this.children[0];
            g.lineStyle(2, 0x00ffcc, 1);
            g.fillStyle(0x00ffcc, 0.9);
            g.beginPath();
            g.moveTo(0, -45);
            g.lineTo(-30, 45);
            g.lineTo(30, 45);
            g.closePath();
            g.fillPath();
            g.strokePath();
        }

        // Rotate left/right
        if (this.scene.input.keyboard.activeKey?. Phaser.Keyboard.D !== null && this.scene.input.keyboard.isDown('D')) {
            this.angle -= 0.06;
        } else if (this.scene.input.keyboard.activeKey?. Phaser.Keyboard.A !== null && this.scene.input.keyboard.isDown('A')) {
            this.angle += 0.06;
        }

        // Apply thrust
        const thrust = this.thrusting ? CONFIG.thrustPower : 0;
        this.speed += Math.cos(this.angle) * thrust * delta / 1000;
        this.scene.physics.velocityFromRotation(this.angle, this.speed, this.vel);
    }

    shoot(scene) {
        if (this.bullets >= CONFIG.maxBullets) return false;
        const cooldown = scene.time.now - this.lastShoot || 0;
        if (cooldown < CONFIG.bulletCooldown) return false;
        this.lastShoot = scene.time.now;
        this.bullets++;

        // Create bullet
        const b = scene.add.circle(15, -20, 3, 0xffff00);
        b.setVelocity(Math.cos(this.angle) * CONFIG.bulletSpeed, Math.sin(this.angle) * CONFIG.bulletSpeed);
        b.setAlpha(1);
        this.scene.tweens.add({ targets: b, alpha: { from: 1, to: 0 }, duration: 300, onComplete: () => b.destroy() });

        scene.sound?.shoot();
        return true;
    }

    hitShield(scene) {
        if (this.shields.length > 0 && this.shields[0].exists()) {
            const slot = this.shields.shift();
            slot.setAlpha(0);
            setTimeout(() => {
                if (slot.exists()) slot.destroy();
            }, 100);
            scene.sound?.hitShield();
        }
    }

    destroy() {
        this.alive = false;
        this.scene.sound?.explosion();
        // Particle explosion
        const p = this.scene.add.particles('particles');
        for (let i = 0; i < 20; i++) {
            const px = Phaser.Math.Between(-30, 30);
            const py = Phaser.Math.Between(-30, 30);
            p.create(this.x + px, this.y + py, { speed: Phaser.Math.Between(50, 200), life: CONFIG.particleLife });
        }
    }

    respawn(scene) {
        this.scene = scene;
        this.speed = 0;
        this.angle = 0;
        this.thrusting = false;
        this.alive = true;
        this.bullets = 0;
        this.lastShoot = 0;
        this.score = 0;
        this.level = 1;

        // Rebuild shields
        for (let i = 0; i < CONFIG.shieldSlots; i++) {
            const angle = Phaser.Math.DegToRad(i * 45 - 90);
            const sx = scene.cameras.main.centerX + Math.cos(angle) * 38;
            const sy = scene.cameras.main.centerY + Math.sin(angle) * 38;
            const slot = scene.add.circle(sx, sy, 6, 0x00ffcc, 0.4);
            this.shields.push(slot);
        }

        // Rebuild graphics
        const g = scene.add.graphics();
        g.lineStyle(2, 0x00ffcc, 1);
        g.fillStyle(0x00ffcc, 0.9);
        g.beginPath();
        g.moveTo(0, -45);
        g.lineTo(-30, 45);
        g.lineTo(30, 45);
        g.closePath();
        g.fillPath();
        g.strokePath();

        const cockpit = scene.add.graphics();
        cockpit.fillStyle(0x00ffcc, 0.5);
        cockpit.beginPath();
        cockpit.moveTo(0, -37);
        cockpit.lineTo(-16, 42);
        cockpit.lineTo(16, 42);
        cockpit.closePath();
        cockpit.fillPath();

        this.add(g);
        this.add(cockpit);
    }
}

// ============================================================
// Asteroid Class - 3 Sizes with Wrap-Around
// ============================================================
class Asteroid extends Phaser.GameObjects.Container {
    constructor(scene, x, y, size) {
        super(scene, x || CONFIG.width / 2 + Phaser.Math.Between(-100, 100),
            y || CONFIG.height / 2 + Phaser.Math.Between(-100, 100));

        this.scene = scene;
        this.size = size; // 1=small(30), 2=medium(50), 3=large(70)
        this.hp = size === 1 ? 1 : (size === 2 ? 2 : 3);
        this.alive = true;

        const radius = { small: 30, medium: 50, large: 70 }[size];
        const g = scene.add.graphics();
        g.lineStyle(2, 0x888888, 1);
        g.fillStyle(0x666666, 0.9);

        // Irregular shape
        for (let i = 0; i < 7; i++) {
            const angle = Phaser.Math.DegToRad(i * 52 + Phaser.Math.Between(-10, 10));
            const r = radius * (0.8 + Phaser.Math.FloatBetween(0, 0.4));
            g.beginPath();
            g.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
            if (i < 6) {
                const nextAngle = Phaser.Math.DegToRad((i + 1) * 52 + Phaser.Math.Between(-10, 10));
                const nr = radius * (0.8 + Phaser.Math.FloatBetween(0, 0.4));
                g.lineTo(Math.cos(nextAngle) * nr, Math.sin(nextAngle) * nr);
            }
        }
        g.closePath();
        g.fillPath();

        this.add(g);
    }

    update() {
        if (!this.alive) return;
        // Wrap around edges
        const x = this.x % CONFIG.width;
        const y = this.y % CONFIG.height;
        this.setPosition(x, y);
    }

    hit(scene) {
        this.hp--;
        if (this.hp <= 0) {
            this.alive = false;
            scene.sound?.explosion();
            // Particles
            const p = scene.add.particles('particles');
            for (let i = 0; i < 15; i++) {
                p.create(this.x + Phaser.Math.Between(-20, 20), this.y + Phaser.Math.Between(-20, 20), {
                    speed: Phaser.Math.Between(30, 150), life: CONFIG.particleLife
                });
            }
        } else if (this.hp === 1) {
            // Split into smaller pieces
            const newAsteroid = new Asteroid(this.scene, this.x + Phaser.Math.Between(-40, 40), this.y + Phaser.Math.Between(-40, 40), 1);
            this.scene.add.existing(newAsteroid);
        }
    }

    destroy() {
        this.alive = false;
    }
}

// ============================================================
// Saucer Enemy Class
// ============================================================
class Saucer extends Phaser.GameObjects.Container {
    constructor(scene, x, y) {
        super(scene, x || CONFIG.width / 2 + Phaser.Math.Between(-100, 100),
            y || CONFIG.height / 2 + Phaser.Math.Between(-100, 100));

        this.scene = scene;
        this.hp = CONFIG.saucerHealth;
        this.alive = true;
        this.speed = CONFIG.saucerSpeed;
        this.angle = Phaser.Math.FloatBetween(0, Math.PI * 2);

        // Saucer body (oval)
        const g = scene.add.graphics();
        g.lineStyle(2, 0xff4444, 1);
        g.fillStyle(0xcc3333, 0.8);
        g.beginPath();
        g.ellipse(0, 0, 25, 15, 0, 0, Math.PI * 2);
        g.closePath();
        g.fillPath();

        // Cockpit circle
        const cockpit = scene.add.circle(0, 0, 6, 0xff4444, 0.7);

        this.add(g);
        this.add(cockpit);
    }

    update() {
        if (!this.alive) return;

        // Move toward player
        const dx = this.scene.player?.x - this.x || CONFIG.width / 2;
        const dy = this.scene.player?.y - this.y || CONFIG.height / 2;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
            this.angle = Phaser.Math.Angle.Between(0, 0, dx, dy);
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
        }

        // Wrap around
        const x = this.x % CONFIG.width;
        const y = this.y % CONFIG.height;
        this.setPosition(x, y);
    }

    hit(scene) {
        this.hp--;
        if (this.hp <= 0) {
            this.alive = false;
            scene.sound?.explosion();
            const p = scene.add.particles('particles');
            for (let i = 0; i < 15; i++) {
                p.create(this.x + Phaser.Math.Between(-20, 20), this.y + Phaser.Math.Between(-20, 20), {
                    speed: Phaser.Math.Between(30, 150), life: CONFIG.particleLife
                });
            }
        }
    }

    destroy() {
        this.alive = false;
    }
}

// ============================================================
// Main Game Scene
// ============================================================
class GameScene extends Phaser.Scene {
    constructor(scene) { super('Game'); }

    create() {
        // Background stars
        const stars = this.add.graphics();
        for (let i = 0; i < 100; i++) {
            const x = Phaser.Math.Between(0, CONFIG.width);
            const y = Phaser.Math.Between(0, CONFIG.height);
            const alpha = Phaser.Math.FloatBetween(0.3, 1);
            stars.fillStyle(0xffffff, alpha);
            stars.fillCircle(x, y, 1);
        }

        // Player ship
        this.player = new Ship(this, CONFIG.width / 2, CONFIG.height / 2);
        this.add.existing(this.player);

        // Sound engine
        this.sound = new SoundEngine(this);

        // Particles
        const particles = this.createParticles();
        this.particles = particles;

        // Asteroids
        this.asteroids = [];
        for (let i = 0; i < CONFIG.asteroidCount; i++) {
            const size = Phaser.Math.Between(1, 3);
            const a = new Asteroid(this, Phaser.Math.Between(0, CONFIG.width), Phaser.Math.Between(0, CONFIG.height), size);
            this.add.existing(a);
            this.asteroids.push(a);
        }

        // Saucer enemies
        this.saucers = [];
        for (let i = 0; i < 2; i++) {
            const s = new Saucer(this, Phaser.Math.Between(100, CONFIG.width - 100), Phaser.Math.Between(100, CONFIG.height - 100));
            this.add.existing(s);
            this.saucers.push(s);
        }

        // HUD
        this.scoreText = this.add.text(CONFIG.width / 2, 30, 'SCORE: 0', { fontSize: '24px', color: '#00ffcc' });
        this.levelText = this.add.text(CONFIG.width / 2, 65, 'LEVEL: 1', { fontSize: '18px', color: '#ffff00' });

        // Game state
        this.gameOver = false;
    }

    update(time, delta) {
        if (this.gameOver) return;

        // Update player
        this.player.update(time, delta);

        // Shoot on spacebar or right half touch
        const shootKey = this.input.keyboard.activeKey?. Phaser.Keyboard.SPACEBAR !== null && this.input.keyboard.isDown('SPACE');
        if (!shootKey && this.input.touch.left.active) {
            this.player.shoot(this);
        } else if (this.input.touch.right.active) {
            this.player.shoot(this);
        }

        // Update asteroids
        for (const a of this.asteroids) {
            a.update();
        }

        // Update saucers
        for (const s of this.saucers) {
            s.update();
        }

        // Collision: bullets vs asteroids/saucers
        const bullets = [];
        if (this.player.bullets > 0) {
            const bx = this.player.x + Math.cos(this.player.angle) * 15;
            const by = this.player.y + Math.sin(this.player.angle) * 15;
            bullets.push({ x: bx, y: by, angle: this.player.angle });
        }

        for (const b of bullets) {
            // Check asteroid collisions
            for (const a of this.asteroids) {
                if (!a.alive) continue;
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 30) {
                    a.hit(this);
                    this.player.bullets--;
                    break;
                }
            }

            // Check saucer collisions
            for (const s of this.saucers) {
                if (!s.alive) continue;
                const dx = s.x - b.x;
                const dy = s.y - b.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 25) {
                    s.hit(this);
                    this.player.bullets--;
                    break;
                }
            }

            // Check player collision with asteroids/saucers
            for (const a of this.asteroids) {
                if (!a.alive) continue;
                const dx = this.player.x - a.x;
                const dy = this.player.y - a.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 30) {
                    this.gameOver();
                    return;
                }
            }

            for (const s of this.saucers) {
                if (!s.alive) continue;
                const dx = this.player.x - s.x;
                const dy = this.player.y - s.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 30) {
                    this.gameOver();
                    return;
                }
            }
        }

        // Level progression: every 1000 points, increase difficulty
        const totalScore = this.player.score;
        const level = Math.floor(totalScore / 500) + 1;
        if (level > this.player.level) {
            this.player.level = level;
            this.sound?.levelUp();
            // Spawn bonus asteroid
            const size = Phaser.Math.Between(2, 3);
            const a = new Asteroid(this, Phaser.Math.Between(0, CONFIG.width), Phaser.Math.Between(0, CONFIG.height), size);
            this.add.existing(a);
            this.asteroids.push(a);
        }

        // Update HUD
        this.scoreText.setText(`SCORE: ${this.player.score}`);
        this.levelText.setText(`LEVEL: ${this.player.level}`);

        // Regenerate shields
        if (time % 100 < 5) {
            for (const slot of this.player.shields) {
                if (!slot.exists()) continue;
                const alpha = slot.alpha + 0.02;
                if (alpha > 0.4) slot.setAlpha(0.4);
            }
        }

        // Update particles
        if (this.particles) this.particles.update(time, delta);
    }

    gameOver() {
        this.gameOver = true;
        this.player.destroy();
        for (const a of this.asteroids) a.destroy();
        for (const s of this.saucers) s.destroy();

        // Game over text
        const goText = this.add.text(CONFIG.width / 2, CONFIG.height / 2 - 50, 'GAME OVER', { fontSize: '48px', color: '#ff0000' });
        const restartBtn = this.add.text(CONFIG.width / 2, CONFIG.height / 2 + 30, 'Press R to Restart', { fontSize: '24px', color: '#ffff00' });

        // Restart on key press
        this.input.keyboard.on('keydown-R', () => {
            this.scene.restart();
        }, this);
    }

    createParticles() {
        return this.add.particles('particles');
    }
}

// ============================================================
// Boot Scene - Initialize Audio Context
// ============================================================
class BootScene extends Phaser.Scene {
    constructor(scene) { super('Boot'); }
    preload() {}
    create() {
        // Resume audio context on first interaction
        this.sound = new SoundEngine(this);
        if (this.sound.ctx.state === 'suspended') {
            this.sound.ctx.resume();
        }
    }
}

// ============================================================
// Game Setup
// ============================================================
const config = {
    type: Phaser.AUTO,
    width: CONFIG.width,
    height: CONFIG.height,
    parent: 'game',
    backgroundColor: '#000011',
    physics: { default: 'arcade' },
    scene: [BootScene, GameScene],
};

const game = new Phaser.Game(config);
</script>
</body>
</html>
